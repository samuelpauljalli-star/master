<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        /* Tic-Tac-Toe Board Styling (using CSS Grid) */
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px); /* 3 columns, 100px wide each */
            grid-template-rows: repeat(3, 100px);    /* 3 rows, 100px high each */
            gap: 5px;
            margin: 20px auto;
            border: 3px solid #333;
            width: 315px; /* 3*100 + 2*5 + 2*3 (borders/gaps) */
        }

        .cell {
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            font-weight: bold;
            cursor: pointer;
            user-select: none; /* Prevents text selection */
            transition: background-color 0.2s;
        }

        .cell:hover {
            background-color: #ddd;
        }
        
        /* Specific styling for players */
        .cell.X { color: #ff6347; /* Red-orange for X */ }
        .cell.O { color: #007bff; /* Blue for O */ }

        #status {
            font-size: 1.5em;
            margin: 20px 0;
            font-weight: bold;
            min-height: 1.5em;
        }

        #reset-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        #reset-btn:hover {
            background-color: #555;
        }
        /* --- END OF CSS STYLES --- */
    </style>

<style id="wow-injected-styles">
/* --- GLOBAL RESET & THEME --- */
:root {
    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);

}

body {
    background-color: var(--bg-dark) !important;

/* TYPOGRAPHY */

    text-transform: uppercase;
    text-align: center;

    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent !important;
    filter: drop-shadow(0px 0px 10px rgba(0, 255, 204, 0.3));

/* GLASSMORPHISM CONTAINERS */
canvas, table, .container > div#game-board, .glass-panel {
    transform: perspective(1000px) rotateX(10deg) scale(1.02) !important;
    transform-origin: center center;
    transform: perspective(1000px) rotateX(8deg) scale(1.02) !important;
    transform-origin: bottom center;
    background: rgba(10,10,15, 0.7) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(200%) !important;

    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;

    margin: 25px auto;
}

canvas:hover, table:hover {
    transform: translateY(-8px) scale(1.03) !important;
    box-shadow: 0 25px 50px rgba(0, 255, 204, 0.2), inset 0 0 25px rgba(176, 38, 255, 0.2) !important;
    border-color: rgba(0, 255, 204, 0.4) !important;
}

/* MODERN BUTTONS */
button, .btn {
    font-family: 'Space Mono', monospace !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    padding: 14px 35px !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff !important;
    background: linear-gradient(135deg, #b026ff, #00ffcc) !important;
    background-size: 200% auto !important;
    border: none !important;
    border-radius: 50px !important;
    box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3) !important;
    cursor: pointer !important;
    transition: all 0.4s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    margin: 15px auto;
    display: inline-block;
}

button::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #00ffcc, #b026ff);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.4s ease;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    transform: translateY(-4px) !important;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.5) !important;
}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {
    font-family: 'Poppins', sans-serif !important;
    font-size: 1.1rem !important;
    color: #b3b3b3 !important;
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.6;
    animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAVIGATION LINKS */
a.back-btn-global, a.back-home {
    position: fixed;
    top: 25px;
    left: 25px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: #fff;
    text-decoration: none;
    background: rgba(25, 25, 35, 0.6);
    padding: 12px 24px;
    border-radius: 30px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
}

a.back-btn-global:hover, a.back-home:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }
}
</style>

<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Tic-Tac-Toe ❌⭕</h1>
        
        <div id="status">Player X's Turn</div>

        <div id="game-board">
            </div>

        <button id="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        
        // 1. Game State Variables
        let board = ['', '', '', '', '', '', '', '', '']; // Represents the 9 cells
        let currentPlayer = 'X';
        let isGameActive = true;

        // 2. DOM Elements
        const gameBoard = document.getElementById('game-board');
        const statusDisplay = document.getElementById('status');
        
        // 3. Winning Conditions (Indices of the winning rows, columns, and diagonals)
        const winningConditions = [
            [0, 1, 2], // Top row
            [3, 4, 5], // Middle row
            [6, 7, 8], // Bottom row
            [0, 3, 6], // Left column
            [1, 4, 7], // Middle column
            [2, 5, 8], // Right column
            [0, 4, 8], // Diagonal top-left to bottom-right
            [2, 4, 6]  // Diagonal top-right to bottom-left
        ];
        
        // 4. Initialization: Create the 9 cell elements
        function createBoard() {
            gameBoard.innerHTML = ''; // Clear existing board
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', handleCellClick);
                gameBoard.appendChild(cell);
            }
        }
        
        // 5. Core Game Logic: Handle a click on a cell
        function handleCellClick(event) {
            const clickedCell = event.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            // Check if the cell is already played or if the game is over
            if (board[clickedCellIndex] !== '' || !isGameActive) {
                return;
            }

            // 1. Update the Board State (JS array)
            board[clickedCellIndex] = currentPlayer;

            // 2. Update the Display (HTML element)
            clickedCell.textContent = currentPlayer;
            clickedCell.classList.add(currentPlayer); // Add X or O class for styling

            // 3. Check for Win or Draw
            handleResultValidation();

            // 4. Change Player (if game is still active)
            if (isGameActive) {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDisplay.textContent = `Player ${currentPlayer}'s Turn`;
            }
        }
        
        // 6. Check Win/Draw conditions
        function handleResultValidation() {
            let roundWon = false;
            
            // Loop through all winning conditions
            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                // Get the content of the three cells in the condition
                let a = board[winCondition[0]];
                let b = board[winCondition[1]];
                let c = board[winCondition[2]];

                // If any cell is empty, skip this condition
                if (a === '' || b === '' || c === '') {
                    continue;
                }
                
                // If all three match, we have a winner
                if (a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.textContent = `🎉 Player ${currentPlayer} Wins!`;
                statusDisplay.style.color = '#ff6347';
                isGameActive = false;
                return;
            }
            
            // Check for Draw (if no winner and no empty cells remain)
            let roundDraw = !board.includes('');
            if (roundDraw) {
                statusDisplay.textContent = `It's a Draw! 🤝`;
                statusDisplay.style.color = '#333';
                isGameActive = false;
                return;
            }
        }
        
        // 7. Reset Function
        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            isGameActive = true;
            statusDisplay.textContent = "Player X's Turn";
            statusDisplay.style.color = '#333';
            
            // Recreate the board (clears all X/O text and classes)
            createBoard(); 
        }

        // Start the game when the script is loaded
        createBoard(); 
        
        // --- END OF JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

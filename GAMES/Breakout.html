<style id="advanced-injected-styles">
/* Advanced Global Animations and Colors */
body {
    background: radial-gradient(circle at center, #1b003a 0%, #050505 100%) !important;
    color: #fff !important;
    font-family: 'Orbitron', sans-serif !important;
    overflow-x: hidden;
}

h1 {
    font-family: 'Press Start 2P', cursive !important;
    font-size: 2.2em !important;
    text-align: center !important;
    text-transform: uppercase !important;
    background: linear-gradient(90deg, #00f2fe, #4facfe, #8338ec, #ff006e);
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    text-shadow: 0px 0px 15px rgba(79, 172, 254, 0.5) !important;
    animation: titleGlow 3s infinite alternate !important;
    margin-bottom: 20px !important;
}

@keyframes titleGlow {
    from { filter: drop-shadow(0 0 5px rgba(255, 0, 110, 0.4)); }
    to { filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.8)); }
}

canvas, .container > div#game-board, table {
    background: rgba(20, 20, 20, 0.6) !important;
    backdrop-filter: blur(10px) !important;
    border: 2px solid rgba(0, 242, 254, 0.3) !important;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(131, 56, 236, 0.2) !important;
    border-radius: 15px !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
    margin: 0 auto;
}

canvas:hover, table:hover {
    transform: scale(1.02) !important;
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.6), inset 0 0 30px rgba(131, 56, 236, 0.4) !important;
    border-color: rgba(0, 242, 254, 0.8) !important;
}

button {
    font-family: 'Orbitron', sans-serif !important;
    font-size: 1.1em !important;
    background: linear-gradient(45deg, #ff006e, #8338ec) !important;
    border: 2px solid transparent !important;
    color: white !important;
    font-weight: bold !important;
    cursor: pointer !important;
    padding: 12px 25px !important;
    border-radius: 30px !important;
    box-shadow: 0 5px 15px rgba(255, 0, 110, 0.4) !important;
    transition: all 0.3s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(45deg, #8338ec, #00f2fe);
    z-index: -1;
    transition: opacity 0.3s ease;
    opacity: 0;
}

button:hover::before {
    opacity: 1;
}

button:hover {
    transform: translateY(-3px) scale(1.05) !important;
    box-shadow: 0 8px 25px rgba(0, 242, 254, 0.6) !important;
    border: 2px solid #00f2fe !important;
}

#status-message, .status, p {
    font-family: 'Orbitron', sans-serif !important;
    color: #4facfe !important;
    text-shadow: 0 0 10px rgba(79, 172, 254, 0.4) !important;
    font-size: 1.2em !important;
    margin: 15px 0 !important;
}

/* Custom Background Particles */
.bg-particle {
    position: fixed;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white;
    pointer-events: none;
    z-index: -1;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.5; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Breakout! 🧱</h1>
        <canvas id="gameCanvas" width="480" height="320"></canvas>
        <div id="status-message">Press Start to Play!</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusMessage = document.getElementById("status-message");
        const startButton = document.getElementById("startButton");

        let gameRunning = false;

        // --- Game Object Properties ---

        // Ball properties
        let ballRadius = 10;
        let x; // ball x-position
        let y; // ball y-position
        let dx; // ball x-speed
        let dy; // ball y-speed

        // Paddle properties
        let paddleHeight = 10;
        let paddleWidth = 75;
        let paddleX; // paddle x-position (top-left)
        let rightPressed = false;
        let leftPressed = false;

        // Brick properties
        let brickRowCount = 3;
        let brickColumnCount = 5;
        let brickWidth = 75;
        let brickHeight = 20;
        let brickPadding = 10;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 30;
        let bricks = [];
        let score = 0;
        let lives = 3;

        // --- Initialization and Reset ---

        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 }; // status 1 = visible
                }
            }
        }

        function resetGame() {
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 2; // Initial horizontal speed
            dy = -2; // Initial vertical speed (moving up)
            paddleX = (canvas.width - paddleWidth) / 2;
            score = 0;
            lives = 3;
            initBricks();
            statusMessage.textContent = "Game started! Use arrow keys.";
            startButton.style.display = 'none';
        }

        // --- Event Handlers (Input) ---

        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);

        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = true;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = false;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = false;
            }
        }

        // --- Drawing Functions ---

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c"; // Red ball
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#3498db"; // Blue paddle
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // Change brick color based on row for visual flair
                        if (r === 0) ctx.fillStyle = "#f1c40f"; // Yellow
                        else if (r === 1) ctx.fillStyle = "#e67e22"; // Orange
                        else ctx.fillStyle = "#c0392b"; // Dark Red
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawScore() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Score: " + score, 8, 20);
        }
        
        function drawLives() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Lives: " + lives, canvas.width - 65, 20);
        }

        // --- Collision Detection ---

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        // Check if the ball's center is within the brick's boundaries
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy; // Reverse the ball's vertical direction
                            b.status = 0; // Hide the brick
                            score++;
                            
                            // Check for win condition
                            if (score === brickRowCount * brickColumnCount) {
                                statusMessage.textContent = "🏆 YOU WIN, CONGRATULATIONS! 🏆";
                                gameRunning = false;
                                startButton.textContent = 'Play Again';
                                startButton.style.display = 'block';
                            }
                        }
                    }
                }
            }
        }

        // --- Main Game Loop ---

        function draw() {
            if (!gameRunning) return;

            // Clear the entire canvas on every frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            drawLives();
            collisionDetection();

            // 1. Ball Movement and Wall Collision
            
            // Left/Right wall collision
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx; // Reverse horizontal direction
            }
            
            // Top wall collision
            if (y + dy < ballRadius) {
                dy = -dy; // Reverse vertical direction
            } 
            // Bottom edge / Paddle interaction
            else if (y + dy > canvas.height - ballRadius - paddleHeight) {
                // Check if the ball hits the paddle
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy; // Reverse vertical direction
                } else if (y + dy > canvas.height - ballRadius) {
                    // Ball missed the paddle (Game Over logic)
                    lives--;
                    if (lives === 0) {
                        statusMessage.textContent = `Game Over! Final Score: ${score}`;
                        gameRunning = false;
                        startButton.textContent = 'Play Again';
                        startButton.style.display = 'block';
                        return; // Stop the loop
                    } else {
                        // Reset ball and paddle position for next life
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 2;
                        dy = -2;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            // 2. Paddle Movement
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            // 3. Update Ball Position
            x += dx;
            y += dy;

            // Request the browser to call draw() again for the next frame
            requestAnimationFrame(draw);
        }
        
        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            resetGame();
            draw(); // Start the game loop
        }
        
        // --- End of JAVASCRIPT LOGIC ---
    </script>

<script id="advanced-injected-logic">
// Inject floating background particles globally into each game
function createParticles() {
    const colors = ['#00f2fe', '#4facfe', '#8338ec', '#ff006e', '#ffd700'];
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.className = 'bg-particle';
        let size = Math.random() * 5 + 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 ${size*2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 4 + 4) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(p);
    }
}

if(document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createParticles);
} else {
    createParticles();
}

// Global click interactive logic: Ripple effect
document.addEventListener("click", function(e) {
    if(e.target.tagName === 'CANVAS' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TD') {
        let ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        ripple.style.width = '10px';
        ripple.style.height = '10px';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00f2fe';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        ripple.style.zIndex = '10000';
        document.body.appendChild(ripple);
        
        requestAnimationFrame(() => {
            ripple.style.width = '120px';
            ripple.style.height = '120px';
            ripple.style.opacity = '0';
            ripple.style.borderWidth = '15px';
            ripple.style.borderColor = '#ff006e';
        });
        
        setTimeout(() => ripple.remove(), 500);
    }
});
</script>

</body>

<style id="wow-injected-styles">
/* --- GLOBAL RESET & THEME --- */

    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);

}

body::before {

/* TYPOGRAPHY */

    background-size: 200% auto;

canvas, table, .container > div#game-board, .glass-panel {

    background: rgba(10,10,15, 0.7) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
    border: 1px solid var(--glass-border) !important;
    border-radius: 24px !important;
    box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05) !important;
    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;

    margin: 25px auto;
}

canvas:hover, table:hover {
    transform: translateY(-8px) scale(1.03) !important;
    box-shadow: 0 25px 50px rgba(0, 255, 204, 0.2), inset 0 0 25px rgba(176, 38, 255, 0.2) !important;
    border-color: rgba(0, 255, 204, 0.4) !important;
}

/* MODERN BUTTONS */
button, .btn {
    font-family: 'Space Mono', monospace !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    padding: 14px 35px !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff !important;
    background: linear-gradient(135deg, #b026ff, #00ffcc) !important;
    background-size: 200% auto !important;
    border: none !important;
    border-radius: 50px !important;
    box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3) !important;
    cursor: pointer !important;
    transition: all 0.4s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    margin: 15px auto;
    display: inline-block;
}

button::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #00ffcc, #b026ff);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.4s ease;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    transform: translateY(-4px) !important;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.5) !important;
}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {
    font-family: 'Poppins', sans-serif !important;
    font-size: 1.1rem !important;
    color: #b3b3b3 !important;
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.6;
    animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAVIGATION LINKS */
a.back-btn-global, a.back-home {
    position: fixed;
    top: 25px;
    left: 25px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: #fff;
    text-decoration: none;
    background: rgba(25, 25, 35, 0.6);
    padding: 12px 24px;
    border-radius: 30px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
}

a.back-btn-global:hover, a.back-home:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }
}

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Sky Pilot ✈️</h1>
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        <div id="status-message">Click Start, then press SPACEBAR or click to fly!</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusMessage = document.getElementById("status-message");
        const startButton = document.getElementById("startButton");

        let gameRunning = false;
        let score = 0;
        let gameLoopId; // To hold the requestAnimationFrame ID

        // --- Player (Pilot) Properties ---
        const player = {
            x: 50,
            y: canvas.height / 2,
            radius: 15,
            color: "#f1c40f", // Yellow
            dy: 0,           // Vertical velocity
            gravity: 0.5,    // Downward acceleration
            lift: -8         // Upward impulse on flap
        };

        // --- Obstacle (Pipes) Properties ---
        let pipes = [];
        const pipeWidth = 50;
        const pipeGap = 130; // Vertical space between top and bottom pipe
        const pipeSpeed = 3;
        let frameCount = 0;
        const spawnInterval = 100; // Frames between pipe spawns (around 1.6 seconds at 60fps)

        // --- Drawing Functions ---

        function drawPlayer() {
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
            
            // Draw a cockpit/eye for flair
            ctx.fillStyle = "#333";
            ctx.fillRect(player.x + 5, player.y - 5, 5, 5);
        }

        function drawPipes() {
            ctx.fillStyle = "#2ecc71"; // Green pipes
            
            pipes.forEach(p => {
                // Top pipe
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                // Bottom pipe
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            });
        }

        function drawScore() {
            ctx.font = "20px Arial";
            ctx.fillStyle = "#2c3e50";
            ctx.textAlign = "left";
            ctx.fillText("Score: " + score, 10, 30);
        }

        // --- Game Logic ---

        /**
         * Checks for collisions between the player and walls/pipes.
         */
        function checkCollision() {
            // 1. Wall Collision (Top and Bottom)
            if (player.y + player.radius > canvas.height || player.y - player.radius < 0) {
                gameOver();
                return;
            }

            // 2. Pipe Collision
            for (let i = 0; i < pipes.length; i++) {
                const p = pipes[i];

                // Check if the player is horizontally aligned with the pipe
                if (player.x + player.radius > p.x && player.x - player.radius < p.x + pipeWidth) {
                    
                    // Check collision with the top pipe OR the bottom pipe
                    if (player.y - player.radius < p.top || player.y + player.radius > canvas.height - p.bottom) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        /**
         * Updates player physics and pipe positions.
         */
        function update() {
            // 1. Player Physics (Gravity and Movement)
            player.dy += player.gravity; // Apply gravity
            player.y += player.dy;       // Update position

            // 2. Pipe Spawning and Movement
            frameCount++;
            
            if (frameCount % spawnInterval === 0) {
                // Determine random height for the top pipe
                const minTop = 50;
                const maxTop = canvas.height - pipeGap - minTop;
                const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
                const bottomHeight = canvas.height - topHeight - pipeGap;
                
                pipes.push({ 
                    x: canvas.width, 
                    top: topHeight, 
                    bottom: bottomHeight,
                    passed: false // Flag to ensure score only increases once
                });
            }

            // Move existing pipes and remove off-screen pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= pipeSpeed; // Move left

                // Score Check
                if (p.x + pipeWidth < player.x && !p.passed) {
                    score++;
                    p.passed = true;
                }

                // Remove pipe if it goes off screen
                if (p.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        // --- Main Game Loop ---

        function gameLoop() {
            if (!gameRunning) return;

            // 1. Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Draw
            drawPipes();
            drawPlayer();
            drawScore();

            // 3. Update
            update();
            
            // 4. Check for End Condition
            checkCollision();

            // Continue the loop
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- Control and Setup ---

        /**
         * Player input (flap).
         */
        function flap() {
            if (gameRunning) {
                player.dy = player.lift; // Instant upward velocity
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent spacebar from scrolling
                flap();
            }
        });

        canvas.addEventListener('click', flap);

        function gameOver() {
            cancelAnimationFrame(gameLoopId);
            gameRunning = false;
            statusMessage.textContent = `💥 Game Over! Final Score: ${score}`;
            startButton.style.display = 'block';
            startButton.textContent = 'Play Again';
        }

        function startGame() {
            if (gameRunning) return;
            
            // Reset game state
            pipes = [];
            score = 0;
            player.y = canvas.height / 2;
            player.dy = 0;
            frameCount = 0;
            
            gameRunning = true;
            statusMessage.textContent = "Flying...";
            startButton.style.display = 'none';
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        // --- END OF JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

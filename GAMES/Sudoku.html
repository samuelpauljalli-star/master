<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Sudoku</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        /* Sudoku Grid Styling */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            width: 450px; /* 9 * 50px */
            height: 450px;
            border: 3px solid #333;
            margin: 20px auto;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            border: 1px solid #aaa;
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
            cursor: pointer;
            position: relative;
        }

        /* Thicker borders for 3x3 sub-grids */
        .cell:nth-child(3n) { border-right-width: 3px; border-right-color: #333; }
        .cell:nth-child(9n) { border-right-width: 1px; border-right-color: #aaa; }
        .row-3 .cell, .row-6 .cell { border-bottom-width: 3px; border-bottom-color: #333; }
        
        /* Input styling */
        .cell input {
            width: 90%;
            height: 90%;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            outline: none;
            background: transparent;
            color: #1e88e5; /* Blue for user input */
        }
        
        /* Pre-filled cells (fixed numbers) */
        .fixed {
            background-color: #eee;
            color: #333; /* Dark color for fixed numbers */
            cursor: default;
        }
        
        .fixed input {
            display: none;
        }
        
        /* Error Highlighting */
        .error {
            background-color: #ffcccc !important; /* Light red */
        }

        /* Success Highlighting (Optional) */
        .correct {
            background-color: #ccffcc !important; /* Light green */
        }

        #status-message {
            font-size: 1.2em;
            margin: 15px 0;
            min-height: 1.2em;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
        /* --- END OF CSS STYLES --- */
    </style>




<!-- Google Fonts & FontAwesome -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">

<style id="advanced-injected-styles">
/* Advanced Global Animations and Colors */

    background: radial-gradient(circle at center, #1b003a 0%, #050505 100%) !important;
    color: #fff !important;
    font-family: 'Orbitron', sans-serif !important;

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Sudoku Challenge 🧠</h1>
        
        <div id="sudoku-grid">
            </div>

        <div id="status-message">Ready to play!</div>
        <button onclick="checkGame()">Check Solution</button>
        <button onclick="initializeBoard()">New Puzzle</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // A simple, solvable 9x9 puzzle (0 represents an empty cell)
        const initialPuzzle = [
            [5, 3, 0, 0, 7, 0, 0, 0, 0],
            [6, 0, 0, 1, 9, 5, 0, 0, 0],
            [0, 9, 8, 0, 0, 0, 0, 6, 0],
            [8, 0, 0, 0, 6, 0, 0, 0, 3],
            [4, 0, 0, 8, 0, 3, 0, 0, 1],
            [7, 0, 0, 0, 2, 0, 0, 0, 6],
            [0, 6, 0, 0, 0, 0, 2, 8, 0],
            [0, 0, 0, 4, 1, 9, 0, 0, 5],
            [0, 0, 0, 0, 8, 0, 0, 7, 9]
        ];

        // The known, correct solution for validation (for this specific puzzle)
        const solution = [
            [5, 3, 4, 6, 7, 8, 9, 1, 2],
            [6, 7, 2, 1, 9, 5, 3, 4, 8],
            [1, 9, 8, 3, 4, 2, 5, 6, 7],
            [8, 5, 9, 7, 6, 1, 4, 2, 3],
            [4, 2, 6, 8, 5, 3, 7, 9, 1],
            [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 1, 5, 3, 7, 2, 8, 4],
            [2, 8, 7, 4, 1, 9, 6, 3, 5],
            [3, 4, 5, 2, 8, 6, 1, 7, 9]
        ];
        
        const gridElement = document.getElementById('sudoku-grid');
        const statusMessage = document.getElementById('status-message');

        /**
         * Clears the grid and populates it with the initial puzzle state.
         */
        function initializeBoard() {
            gridElement.innerHTML = ''; // Clear previous board
            statusMessage.textContent = 'Ready to play!';

            for (let r = 0; r < 9; r++) {
                // Add class to the row container for CSS targeting of thicker borders
                const rowClass = `row-${r + 1}`;
                
                for (let c = 0; c < 9; c++) {
                    const cellValue = initialPuzzle[r][c];
                    
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.classList.add(rowClass);
                    cell.setAttribute('data-row', r);
                    cell.setAttribute('data-col', c);

                    if (cellValue !== 0) {
                        // Fixed number
                        cell.classList.add('fixed');
                        cell.textContent = cellValue;
                    } else {
                        // User input cell
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.pattern = "[1-9]";
                        input.addEventListener('input', handleInput);
                        cell.appendChild(input);
                    }
                    
                    gridElement.appendChild(cell);
                }
            }
        }
        
        /**
         * Handles user input into a cell, validates it, and updates the display.
         */
        function handleInput(event) {
            const inputElement = event.target;
            const cellElement = inputElement.parentNode;
            const value = inputElement.value.trim();
            
            // Allow only single digits 1-9
            if (!/^[1-9]$/.test(value)) {
                inputElement.value = ''; // Clear invalid input
                return;
            }
            
            // Simple validation feedback: Check if the entered number matches the solution
            const r = parseInt(cellElement.getAttribute('data-row'));
            const c = parseInt(cellElement.getAttribute('data-col'));
            
            // Remove previous feedback classes
            cellElement.classList.remove('error', 'correct');

            if (parseInt(value) === solution[r][c]) {
                // Number is correct
                cellElement.classList.add('correct');
            } else {
                // Number is incorrect (but we won't show it immediately, only on check)
            }
        }

        /**
         * Checks the entire board state against the known solution.
         */
        function checkGame() {
            let errors = 0;
            let solved = true;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('error', 'correct'); // Reset highlighting
                
                const r = parseInt(cell.getAttribute('data-row'));
                const c = parseInt(cell.getAttribute('data-col'));
                let enteredValue = 0;
                
                if (cell.classList.contains('fixed')) {
                    enteredValue = parseInt(cell.textContent);
                } else {
                    const input = cell.querySelector('input');
                    enteredValue = input.value ? parseInt(input.value) : 0;
                }

                // Check against the solution
                if (enteredValue === 0) {
                    solved = false;
                } else if (enteredValue !== solution[r][c]) {
                    cell.classList.add('error');
                    errors++;
                    solved = false;
                }
            });

            if (solved && errors === 0) {
                statusMessage.textContent = '🥳 Congratulations! Puzzle Solved!';
            } else if (errors > 0) {
                statusMessage.textContent = `❌ Found ${errors} error(s)! Keep trying.`;
            } else {
                statusMessage.textContent = 'Keep going! There are still empty cells.';
            }
        }
        
        // Start the game when the script loads
        initializeBoard();

        // --- END OF JAVASCRIPT LOGIC ---
    </script>

<script id="advanced-injected-logic">
// Inject floating background particles globally into each game
function createParticles() {
    const colors = ['#00f2fe', '#4facfe', '#8338ec', '#ff006e', '#ffd700'];
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.className = 'bg-particle';
        let size = Math.random() * 5 + 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 ${size*2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 4 + 4) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(p);
    }
}

if(document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createParticles);
} else {
    createParticles();
}

// Global click interactive logic: Ripple effect
document.addEventListener("click", function(e) {
    if(e.target.tagName === 'CANVAS' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TD') {
        let ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        ripple.style.width = '10px';
        ripple.style.height = '10px';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00f2fe';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        ripple.style.zIndex = '10000';
        document.body.appendChild(ripple);
        
        requestAnimationFrame(() => {
            ripple.style.width = '120px';
            ripple.style.height = '120px';
            ripple.style.opacity = '0';
            ripple.style.borderWidth = '15px';
            ripple.style.borderColor = '#ff006e';
        });
        
        setTimeout(() => ripple.remove(), 500);
    }
});
</script>

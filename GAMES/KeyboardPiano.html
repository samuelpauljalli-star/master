<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Piano</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #1a73e8; /* Blue */
            margin-bottom: 30px;
        }
        
        #instructions {
            margin-bottom: 20px;
            font-style: italic;
            color: #555;
        }

        /* Piano Key Container */
        .piano-keys {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background-color: #333; /* Dark background for key area */
            border-radius: 8px;
        }

        .key {
            width: 70px;
            height: 150px;
            background-color: #fff;
            border: 1px solid #000;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
            transition: background-color 0.1s, transform 0.1s;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }
        
        /* Visual feedback when a key is pressed */
        .key.active {
            background-color: #ccc; /* Grey when pressed */
            transform: translateY(2px);
            box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
        }

        /* Styling for the keyboard letter label */
        .key-label {
            font-size: 0.8em;
            margin-top: 5px;
            color: #555;
        }
        /* --- END OF CSS STYLES --- */
    </style>

/* MODERN BUTTONS */

/* PARAGRAPHS & STATUS */
#status-message, .status, p {

/* NAVIGATION LINKS */

}

a.back-btn-global:hover, a.back-home:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Simple Keyboard Piano 🎶</h1>
        
        <div id="instructions">
            Press the **A, S, D, F, G, H, J, K** keys on your keyboard to play the notes!
        </div>

        <div class="piano-keys" id="piano-container">
            </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        
        // Map keyboard keys to musical frequencies (Hz) for C major scale
        // These are standard frequencies for the 4th octave (C4 to C5)
        const noteMap = {
            'a': { frequency: 261.63, note: 'C4' }, // A key -> C note
            's': { frequency: 293.66, note: 'D4' },
            'd': { frequency: 329.63, note: 'E4' },
            'f': { frequency: 349.23, note: 'F4' },
            'g': { frequency: 392.00, note: 'G4' },
            'h': { frequency: 440.00, note: 'A4' },
            'j': { frequency: 493.88, note: 'B4' },
            'k': { frequency: 523.25, note: 'C5' }
        };

        const pianoContainer = document.getElementById('piano-container');
        
        // Web Audio API context
        let audioContext;
        
        // Keep track of currently playing oscillators to prevent key-press stacking
        let oscillators = {};

        /**
         * Initializes the Web Audio API context. Must be done after a user interaction.
         */
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        /**
         * Plays a specific frequency.
         * @param {number} frequency - The frequency (in Hz) to play.
         * @param {string} key - The keyboard key that triggered the note.
         */
        function playNote(frequency, key) {
            initAudioContext();
            
            // Check if the note is already playing
            if (oscillators[key]) {
                return;
            }

            // Create oscillator node (the sound source)
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine'; // Can be 'sine', 'square', 'sawtooth', 'triangle'
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

            // Create gain node (the volume control)
            const gainNode = audioContext.createGain();
            // Start quiet and fade in quickly
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioContext.currentTime + 0.01); 

            // Connect the nodes: Oscillator -> Gain -> Destination (Speakers)
            oscillator.connect(gainNode).connect(audioContext.destination);

            // Start the sound
            oscillator.start();
            oscillators[key] = oscillator; // Store the oscillator
        }

        /**
         * Stops the note associated with the given keyboard key.
         * @param {string} key - The keyboard key to stop.
         */
        function stopNote(key) {
            const oscillator = oscillators[key];
            if (oscillator) {
                // Quickly fade out the note to prevent clicks/pops
                const gainNode = oscillator.context.createGain();
                oscillator.disconnect();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                gainNode.gain.linearRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
                
                // Stop the oscillator after the fade-out
                oscillator.stop(audioContext.currentTime + 0.1); 
                delete oscillators[key];
            }
        }

        // --- Event Handlers ---

        /**
         * Handles pressing a key on the physical keyboard.
         */
        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (noteMap[key]) {
                // Prevent default browser actions (like scrolling)
                event.preventDefault(); 
                
                // Add visual feedback
                const keyElement = document.querySelector(`.key[data-key="${key}"]`);
                if (keyElement) {
                    keyElement.classList.add('active');
                }
                
                playNote(noteMap[key].frequency, key);
            }
        });

        /**
         * Handles releasing a key on the physical keyboard.
         */
        document.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (noteMap[key]) {
                // Remove visual feedback
                const keyElement = document.querySelector(`.key[data-key="${key}"]`);
                if (keyElement) {
                    keyElement.classList.remove('active');
                }
                
                stopNote(key);
            }
        });

        /**
         * Dynamically creates the visual piano keys in the HTML.
         */
        function createPianoKeys() {
            pianoContainer.innerHTML = ''; // Clear existing keys
            
            for (const [key, data] of Object.entries(noteMap)) {
                const keyDiv = document.createElement('div');
                keyDiv.classList.add('key');
                keyDiv.setAttribute('data-key', key);
                
                // Note Label (e.g., C4)
                const noteLabel = document.createElement('span');
                noteLabel.textContent = data.note;
                
                // Keyboard Key Label (e.g., A)
                const keyLabel = document.createElement('span');
                keyLabel.classList.add('key-label');
                keyLabel.textContent = key.toUpperCase();
                
                keyDiv.appendChild(noteLabel);
                keyDiv.appendChild(keyLabel);

                // Add mouse event handlers for screen clicks
                keyDiv.addEventListener('mousedown', () => {
                    keyDiv.classList.add('active');
                    playNote(data.frequency, key);
                });
                
                keyDiv.addEventListener('mouseup', () => {
                    keyDiv.classList.remove('active');
                    stopNote(key);
                });

                keyDiv.addEventListener('mouseleave', () => {
                     if (keyDiv.classList.contains('active')) {
                        keyDiv.classList.remove('active');
                        stopNote(key);
                    }
                });
                
                pianoContainer.appendChild(keyDiv);
            }
        }

        // Start the piano UI
        createPianoKeys();
        
        // --- END OF JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

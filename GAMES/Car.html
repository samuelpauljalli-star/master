<style id="wow-injected-styles">
/* --- GLOBAL RESET & THEME --- */
:root {
    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);
    --glass-border: rgba(255, 255, 255, 0.08);
}

body {
    background-color: var(--bg-dark) !important;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(176, 38, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.1) 0%, transparent 40%) !important;
    color: #e0e0e0 !important;
    font-family: 'Poppins', sans-serif !important;
    overflow-x: hidden;
    min-height: 100vh;
}

    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(7,7,10,0.95), rgba(20,10,30,0.7));

    color: transparent !important;

@keyframes h1Shine {

canvas, table, .container > div#game-board, .glass-panel {
    background: rgba(10,10,15, 0.7) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;

    display: block;
    margin: 20px auto;

/* CAR GAME CANVAS — 3D tilt like an arcade screen */
#gameCanvas {
    transform: perspective(900px) rotateX(10deg) !important;
    transform-origin: bottom center;
    border: 3px solid #00ffcc !important;
    box-shadow: 0 40px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,255,204,0.3) !important;

#gameCanvas.shake {
    animation: hitShake 0.45s ease;
}

    0%   { transform: perspective(900px) rotateX(10deg) translate(0,0); }
    15%  { transform: perspective(900px) rotateX(10deg) translate(-6px, 4px); }
    30%  { transform: perspective(900px) rotateX(10deg) translate(6px, -4px); }
    45%  { transform: perspective(900px) rotateX(10deg) translate(-4px, 2px); }
    60%  { transform: perspective(900px) rotateX(10deg) translate(4px, -2px); }
    75%  { transform: perspective(900px) rotateX(10deg) translate(-2px, 1px); }
    100% { transform: perspective(900px) rotateX(10deg) translate(0,0); }
}

/* MODERN BUTTONS */

    background: linear-gradient(135deg, #00ffcc, #b026ff);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.4s ease;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    transform: translateY(-4px) !important;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.5) !important;
}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {
    font-family: 'Poppins', sans-serif !important;
    font-size: 1.1rem !important;

    animation: fadeIn 1.5s ease-out;

}

/* NAVIGATION LINKS */

    background: rgba(25, 25, 35, 0.6);

    border-radius: 30px;

    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;

    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }

    <div class="container">
        <h1>2D Car Racer 🏁</h1>
        <canvas id="gameCanvas" width="500" height="720"></canvas>
        <div id="status-message">Press Start, then use **Arrow Keys** to steer!</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusMessage = document.getElementById("status-message");
        const startButton = document.getElementById("startButton");

        let gameRunning = false;
        let score = 0;
        let gameLoopId;

        // ═══════════════════════════════════════════
        // GAME CONSTANTS — tuned for 500×720 desktop
        // ═══════════════════════════════════════════
        const W = canvas.width;   // 500
        const H = canvas.height;  // 720
        const roadWidth = 340;    // Road takes most of the width
        const roadLeft  = (W - roadWidth) / 2;  // 80
        const roadRight = roadLeft + roadWidth;  // 420

        const laneMarkingW = 12;
        const laneMarkingH = 55;
        const markingGap   = 45;
        let   markingYOffset = 0;

        // ── Player car ──
        const CEMOJI = 55;       // emoji font size px
        const CAR_W  = 48;
        const CAR_H  = 70;

        const playerCar = {
            width:    CAR_W,
            height:   CAR_H,
            x:        W / 2 - CAR_W / 2,
            y:        H - CAR_H - 40,
            speed:    8,
            laneMinX: roadLeft + 8,
            laneMaxX: roadRight - CAR_W - 8
        };

        // ── Obstacles ──
        const OBS_W  = 48;
        const OBS_H  = 70;
        const OBS_EMOJIS = ['🚕','🚙','🚓','🚚','🚜','🚑'];

        let obstacles    = [];
        let scorePopups  = [];
        let baseSpeed    = 5;
        let spawnInterval = 90;
        let frameCount    = 0;

        // ── Input ──
        let leftPressed  = false;
        let rightPressed = false;

        // ════════════════════════════════
        // DRAW HELPERS
        // ════════════════════════════════
        function drawRoad() {
            // Dark grass sides
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, W, H);

            // Asphalt gradient
            const asphalt = ctx.createLinearGradient(0, 0, 0, H);
            asphalt.addColorStop(0,   '#1a1a22');
            asphalt.addColorStop(1,   '#2a2a35');
            ctx.fillStyle = asphalt;
            ctx.fillRect(roadLeft, 0, roadWidth, H);

            // Neon shoulder lines
            ctx.shadowColor = '#ff006e';
            ctx.shadowBlur  = 18;
            ctx.fillStyle   = '#ff006e';
            ctx.fillRect(roadLeft,      0, 5, H);
            ctx.fillRect(roadRight - 5, 0, 5, H);
            ctx.shadowBlur = 0;

            // Scrolling centre markings
            const spd = baseSpeed + score * 0.12;
            markingYOffset = (markingYOffset + spd) % (laneMarkingH + markingGap);

            ctx.fillStyle   = '#00ffcc';
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur  = 10;
            const cx = W / 2 - laneMarkingW / 2;
            for (let i = -1; i * (laneMarkingH + markingGap) < H + markingGap; i++) {
                const y = i * (laneMarkingH + markingGap) + markingYOffset;
                ctx.fillRect(cx, y, laneMarkingW, laneMarkingH);
            }
            ctx.shadowBlur = 0;
        }

        function drawEmoji(emoji, fontSize, cx, cy, rotRad) {
            ctx.save();
            ctx.font         = fontSize + 'px Arial';
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.translate(cx, cy);
            ctx.rotate(rotRad);
            ctx.fillText(emoji, 0, 0);
            ctx.restore();
        }

        function drawPlayerCar() {
            // Exhaust flames behind the car (top, since it's going "backward")
            if (gameRunning && Math.random() > 0.4) {
                ctx.fillStyle = `rgba(255, ${80 + Math.random()*80|0}, 0, 0.65)`;
                ctx.beginPath();
                const ex = playerCar.x + CAR_W / 2;
                const ey = playerCar.y - 4;
                ctx.arc(ex - 13, ey, Math.random() * 7 + 2, 0, Math.PI * 2);
                ctx.arc(ex + 13, ey, Math.random() * 7 + 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Glow halo
            ctx.shadowColor = 'rgba(0,255,204,0.7)';
            ctx.shadowBlur  = 20;
            drawEmoji('🏎️', CEMOJI,
                playerCar.x + CAR_W / 2,
                playerCar.y + CAR_H / 2,
                Math.PI / 2   // 90° → face-down (reverse look)
            );
            ctx.shadowBlur = 0;
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.shadowColor = 'rgba(255,0,110,0.8)';
                ctx.shadowBlur  = 16;
                drawEmoji(obs.emoji, CEMOJI - 4,
                    obs.x + OBS_W / 2,
                    obs.y + OBS_H / 2,
                    -Math.PI / 2  // -90° → face-up (oncoming)
                );
                ctx.shadowBlur = 0;
            });
        }

        function drawHUD() {
            // Score
            ctx.font        = "bold 22px 'Space Mono', monospace";
            ctx.fillStyle   = '#fff';
            ctx.shadowColor = '#b026ff';
            ctx.shadowBlur  = 12;
            ctx.textAlign   = 'left';
            ctx.fillText(`SCORE: ${score}`, 16, 36);

            // Speed tier
            const tier = Math.min(Math.floor(score / 5) + 1, 9);
            ctx.fillStyle   = '#00ffcc';
            ctx.shadowColor = '#00ffcc';
            ctx.textAlign   = 'right';
            ctx.fillText(`LV ${tier}`, W - 16, 36);
            ctx.shadowBlur  = 0;

            // Floating +1 popups
            scorePopups.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.font        = "bold 30px 'Space Mono', monospace";
                ctx.fillStyle   = '#00ffcc';
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur  = 18;
                ctx.textAlign   = 'center';
                ctx.fillText('+1', p.x, p.y);
                ctx.shadowBlur  = 0;
                ctx.restore();
            });
        }

        // ════════════════════════════════
        // GAME LOGIC
        // ════════════════════════════════
        function spawnObstacle() {
            const x = roadLeft + 8 + Math.random() * (roadWidth - OBS_W - 16);
            const emoji = OBS_EMOJIS[Math.floor(Math.random() * OBS_EMOJIS.length)];
            obstacles.push({ x, y: -OBS_H, width: OBS_W, height: OBS_H, emoji, isPassed: false });
        }

        function update() {
            const speed = baseSpeed + score * 0.12;
            spawnInterval = Math.max(28, 90 - score * 1.8);

            // Steer
            const steerSpeed = playerCar.speed + score * 0.04;
            if (leftPressed)  playerCar.x -= steerSpeed;
            if (rightPressed) playerCar.x += steerSpeed;
            playerCar.x = Math.max(playerCar.laneMinX, Math.min(playerCar.laneMaxX, playerCar.x));

            // Spawn
            frameCount++;
            if (frameCount % Math.floor(spawnInterval) === 0) spawnObstacle();

            // Move obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += speed;

                if (!obs.isPassed && obs.y + OBS_H > playerCar.y) {
                    obs.isPassed = true;
                    score++;
                    // +1 popup near the player car
                    scorePopups.push({
                        x: playerCar.x + CAR_W / 2 + (Math.random() > 0.5 ? 50 : -50),
                        y: playerCar.y - 10,
                        alpha: 1.0
                    });
                }

                if (obs.y > H) obstacles.splice(i, 1);
            }

            // Animate popups
            for (let p = scorePopups.length - 1; p >= 0; p--) {
                scorePopups[p].y     -= 2.5;
                scorePopups[p].alpha -= 0.025;
                if (scorePopups[p].alpha <= 0) scorePopups.splice(p, 1);
            }

            checkCollision();
        }

        function checkCollision() {
            const shrink = 10; // tighter hitbox so emojis feel fair
            for (const obs of obstacles) {
                if (
                    playerCar.x + shrink            < obs.x + OBS_W - shrink &&
                    playerCar.x + CAR_W - shrink    > obs.x + shrink &&
                    playerCar.y + shrink            < obs.y + OBS_H - shrink &&
                    playerCar.y + CAR_H - shrink    > obs.y + shrink
                ) {
                    gameOver();
                    return;
                }
            }
        }

        // ════════════════════════════════
        // MAIN LOOP
        // ════════════════════════════════
        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, W, H);
            drawRoad();
            drawObstacles();
            drawPlayerCar();
            drawHUD();
            update();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // ── Input ──
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft')  { leftPressed  = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft')  leftPressed  = false;
            if (e.key === 'ArrowRight') rightPressed = false;
        });

        // Touch / swipe support
        let touchStartX = null;
        canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        canvas.addEventListener('touchmove',  e => {
            if (touchStartX === null) return;
            const dx = e.touches[0].clientX - touchStartX;
            if (Math.abs(dx) > 10) {
                leftPressed  = dx < 0;
                rightPressed = dx > 0;
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', () => { leftPressed = rightPressed = false; touchStartX = null; }, { passive: true });

        // ── Control ──
        function gameOver() {
            cancelAnimationFrame(gameLoopId);
            gameRunning = false;
            statusMessage.textContent = `💥 CRASHED! Final Score: ${score}`;
            startButton.style.display = 'block';
            startButton.textContent   = '🔁 Play Again';
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 450);
        }

        function startGame() {
            if (gameRunning) return;
            score         = 0;
            obstacles     = [];
            scorePopups   = [];
            frameCount    = 0;
            baseSpeed     = 5;
            spawnInterval = 90;
            playerCar.x   = W / 2 - CAR_W / 2;
            gameRunning   = true;
            statusMessage.textContent = '🏁 GO! Use ← → Arrow Keys to dodge!';
            startButton.style.display = 'none';
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // — END OF GAME LOGIC —
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

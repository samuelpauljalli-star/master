    <style>

<!-- Google Fonts & FontAwesome -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style id="advanced-injected-styles">
/* Advanced Global Animations and Colors */
body {
    background: radial-gradient(circle at center, #1b003a 0%, #050505 100%) !important;
    color: #fff !important;
    font-family: 'Orbitron', sans-serif !important;
    overflow-x: hidden;
}

h1 {
    font-family: 'Press Start 2P', cursive !important;
    font-size: 2.2em !important;
    text-align: center !important;
    text-transform: uppercase !important;
    background: linear-gradient(90deg, #00f2fe, #4facfe, #8338ec, #ff006e);
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    text-shadow: 0px 0px 15px rgba(79, 172, 254, 0.5) !important;
    animation: titleGlow 3s infinite alternate !important;
    margin-bottom: 20px !important;
}

@keyframes titleGlow {
    from { filter: drop-shadow(0 0 5px rgba(255, 0, 110, 0.4)); }
    to { filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.8)); }
}

canvas, .container > div#game-board, table {
    background: rgba(20, 20, 20, 0.6) !important;
    backdrop-filter: blur(10px) !important;
    border: 2px solid rgba(0, 242, 254, 0.3) !important;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(131, 56, 236, 0.2) !important;
    border-radius: 15px !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
    margin: 0 auto;
}

canvas:hover, table:hover {
    transform: scale(1.02) !important;
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.6), inset 0 0 30px rgba(131, 56, 236, 0.4) !important;
    border-color: rgba(0, 242, 254, 0.8) !important;
}

button {
    font-family: 'Orbitron', sans-serif !important;
    font-size: 1.1em !important;
    background: linear-gradient(45deg, #ff006e, #8338ec) !important;
    border: 2px solid transparent !important;
    color: white !important;
    font-weight: bold !important;
    cursor: pointer !important;
    padding: 12px 25px !important;
    border-radius: 30px !important;
    box-shadow: 0 5px 15px rgba(255, 0, 110, 0.4) !important;
    transition: all 0.3s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(45deg, #8338ec, #00f2fe);
    z-index: -1;
    transition: opacity 0.3s ease;
    opacity: 0;
}

button:hover::before {
    opacity: 1;
}

button:hover {
    transform: translateY(-3px) scale(1.05) !important;
    box-shadow: 0 8px 25px rgba(0, 242, 254, 0.6) !important;
    border: 2px solid #00f2fe !important;
}

#status-message, .status, p {
    font-family: 'Orbitron', sans-serif !important;
    color: #4facfe !important;
    text-shadow: 0 0 10px rgba(79, 172, 254, 0.4) !important;
    font-size: 1.2em !important;
    margin: 15px 0 !important;
}

/* Custom Background Particles */
.bg-particle {
    position: fixed;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white;
    pointer-events: none;
    z-index: -1;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.5; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
}
</style>

</head>
<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>2D Car Racer 🏁</h1>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="status-message">Press Start, then use **Arrow Keys** to steer!</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusMessage = document.getElementById("status-message");
        const startButton = document.getElementById("startButton");

        let gameRunning = false;
        let score = 0;
        let gameLoopId;

        // --- Game Constants ---
        const roadWidth = 200;
        const laneMarkingWidth = 10;
        const laneMarkingHeight = 40;
        const markingGap = 30;
        let markingYOffset = 0; // Controls the scrolling effect

        // --- Player Car Properties ---
        const playerCar = {
            width: 30,
            height: 50,
            x: canvas.width / 2 - 15, // Center of the road initially
            y: canvas.height - 80,
            color: "#e74c3c", // Red car
            speed: 5,
            laneMinX: (canvas.width - roadWidth) / 2, // Left edge of the road
            laneMaxX: (canvas.width + roadWidth) / 2 - 30 // Right edge of the road minus car width
        };

        // --- Opponent Car/Obstacle Properties ---
        let obstacles = [];
        const obstacleWidth = 30;
        const obstacleHeight = 50;
        const obstacleColor = "#f1c40f"; // Yellow obstacles
        const obstacleSpeed = 4;
        const spawnInterval = 120; // Frames between obstacle spawns
        let frameCount = 0;

        // --- Input State ---
        let leftPressed = false;
        let rightPressed = false;

        // --- Drawing Functions ---

        /**
         * Draws the road and the scrolling lane markings.
         */
        function drawRoad() {
            const roadLeft = (canvas.width - roadWidth) / 2;
            const roadRight = (canvas.width + roadWidth) / 2;
            
            // 1. Draw Asphalt (Inner Road)
            ctx.fillStyle = '#666'; 
            ctx.fillRect(roadLeft, 0, roadWidth, canvas.height);

            // 2. Draw Lane Markings (Scrolling Effect)
            const centerLineX = canvas.width / 2 - laneMarkingWidth / 2;
            
            // Update the scroll offset
            markingYOffset += obstacleSpeed;
            if (markingYOffset >= markingGap + laneMarkingHeight) {
                markingYOffset = 0;
            }

            // Draw markings based on the offset
            for (let i = -1; i * (laneMarkingHeight + markingGap) < canvas.height + markingGap; i++) {
                const y = i * (laneMarkingHeight + markingGap) + markingYOffset;
                ctx.fillStyle = '#fff';
                ctx.fillRect(centerLineX, y, laneMarkingWidth, laneMarkingHeight);
            }
        }

        function drawPlayerCar() {
            ctx.fillStyle = playerCar.color;
            ctx.fillRect(playerCar.x, playerCar.y, playerCar.width, playerCar.height);
        }

        function drawObstacles() {
            ctx.fillStyle = obstacleColor;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function drawScore() {
            ctx.font = "20px Arial";
            ctx.fillStyle = "#fff";
            ctx.textAlign = "left";
            ctx.fillText("Score: " + score, 10, 30);
        }

        // --- Game Logic ---

        /**
         * Spawns a new obstacle at a random valid horizontal position.
         */
        function spawnObstacle() {
            const roadLeft = (canvas.width - roadWidth) / 2;
            const roadRight = (canvas.width + roadWidth) / 2 - obstacleWidth;
            
            // Randomly choose a spawn position within the road width
            const randomX = roadLeft + Math.random() * (roadRight - roadLeft);
            
            obstacles.push({
                x: randomX,
                y: -obstacleHeight, // Start just above the canvas
                width: obstacleWidth,
                height: obstacleHeight
            });
        }

        /**
         * Updates movement, scoring, and checks collisions.
         */
        function update() {
            // 1. Handle Player Steering
            if (leftPressed) {
                playerCar.x -= playerCar.speed;
            }
            if (rightPressed) {
                playerCar.x += playerCar.speed;
            }

            // Keep car within road boundaries
            if (playerCar.x < playerCar.laneMinX) {
                playerCar.x = playerCar.laneMinX;
            }
            if (playerCar.x > playerCar.laneMaxX) {
                playerCar.x = playerCar.laneMaxX;
            }

            // 2. Spawn Obstacles
            frameCount++;
            if (frameCount % spawnInterval === 0) {
                spawnObstacle();
            }

            // 3. Move and Score Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += obstacleSpeed; // Move down

                // Score point and remove obstacle if it passes the player
                if (obs.y > playerCar.y && obs.y - obstacleSpeed <= playerCar.y) {
                    score++;
                }

                // Remove off-screen obstacles
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                }
            }
            
            // 4. Collision Check
            checkCollision();
        }

        /**
         * Checks for collision between the player and any obstacle.
         */
        function checkCollision() {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];

                // AABB (Axis-Aligned Bounding Box) collision check
                if (
                    playerCar.x < obs.x + obs.width &&
                    playerCar.x + playerCar.width > obs.x &&
                    playerCar.y < obs.y + obs.height &&
                    playerCar.y + playerCar.height > obs.y
                ) {
                    gameOver();
                    return;
                }
            }
        }

        // --- Main Game Loop ---

        function gameLoop() {
            if (!gameRunning) return;

            // 1. Clear Canvas (Only the road area needs redrawing)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 2. Draw
            drawRoad();
            drawPlayerCar();
            drawObstacles();
            drawScore();

            // 3. Update Logic
            update();

            // Continue the loop
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- Input Handling ---

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                leftPressed = true;
            } else if (e.key === 'ArrowRight') {
                rightPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') {
                leftPressed = false;
            } else if (e.key === 'ArrowRight') {
                rightPressed = false;
            }
        });

        // --- Game Control ---

        function gameOver() {
            cancelAnimationFrame(gameLoopId);
            gameRunning = false;
            statusMessage.textContent = `💥 Game Over! Final Score: ${score}`;
            startButton.style.display = 'block';
            startButton.textContent = 'Play Again';
        }

        function startGame() {
            if (gameRunning) return;
            
            // Reset game state
            score = 0;
            obstacles = [];
            frameCount = 0;
            playerCar.x = canvas.width / 2 - playerCar.width / 2; // Recenter car
            
            gameRunning = true;
            statusMessage.textContent = "Driving! Watch out for obstacles.";
            startButton.style.display = 'none';
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        // --- END OF JAVASCRIPT LOGIC ---
    </script>

<script id="advanced-injected-logic">
// Inject floating background particles globally into each game
function createParticles() {
    const colors = ['#00f2fe', '#4facfe', '#8338ec', '#ff006e', '#ffd700'];
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.className = 'bg-particle';
        let size = Math.random() * 5 + 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 ${size*2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 4 + 4) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(p);
    }
}

if(document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createParticles);
} else {
    createParticles();
}

// Global click interactive logic: Ripple effect
document.addEventListener("click", function(e) {
    if(e.target.tagName === 'CANVAS' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TD') {
        let ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        ripple.style.width = '10px';
        ripple.style.height = '10px';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00f2fe';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        ripple.style.zIndex = '10000';
        document.body.appendChild(ripple);
        
        requestAnimationFrame(() => {
            ripple.style.width = '120px';
            ripple.style.height = '120px';
            ripple.style.opacity = '0';
            ripple.style.borderWidth = '15px';
            ripple.style.borderColor = '#ff006e';
        });
        
        setTimeout(() => ripple.remove(), 500);
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Runner Game</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f7f7f7; /* Off-white background */
            color: #000;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #555;
            margin-bottom: 10px;
        }

        /* Canvas element for the game graphics */
        #gameCanvas {
            background: #ffffff; /* White background */
            border-bottom: 3px solid #000000; /* Ground line */
            display: block;
            margin: 0 auto;
        }

        #status-message {
            color: #000;
            font-size: 1em;
            margin-top: 15px;
            min-height: 1.5em;
        }

        button {
            background-color: #000; 
            color: white;
            border: 2px solid #000;
            padding: 8px 15px;
            border-radius: 0;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #333;
        }
        /* --- END OF CSS STYLES --- */
    </style>










<!-- Preconnect and Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style id="wow-injected-styles">
/* --- GLOBAL RESET & THEME --- */
:root {
    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);
    --glass-border: rgba(255, 255, 255, 0.08);
}

body {
    background-color: var(--bg-dark) !important;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(176, 38, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.1) 0%, transparent 40%) !important;
    color: #e0e0e0 !important;
    font-family: 'Poppins', sans-serif !important;
    overflow-x: hidden;
    min-height: 100vh;
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(7,7,10,0.95), rgba(20,10,30,0.7));
    z-index: -2;
    pointer-events: none;
}

/* TYPOGRAPHY */
h1 {
    font-family: 'Space Mono', monospace !important;
    font-size: clamp(2rem, 5vw, 3.5rem) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(135deg, #00ffcc, #b026ff, #ff006e);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent !important;
    filter: drop-shadow(0px 0px 10px rgba(0, 255, 204, 0.3));
    animation: h1Shine 5s linear infinite;
    margin: 40px 0 20px 0 !important;
    letter-spacing: 3px;
}

@keyframes h1Shine {
    to { background-position: 200% center; }
}

/* GLASSMORPHISM CONTAINERS */
canvas, table, .container > div#game-board, .glass-panel {
    transform: perspective(1000px) rotateX(8deg) scale(1.02) !important;
    transform-origin: bottom center;
    background: var(--glass-bg) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
    border: 1px solid var(--glass-border) !important;
    border-radius: 24px !important;
    box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05) !important;
    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
    display: block;
    margin: 25px auto;
}

canvas:hover, table:hover {
    transform: translateY(-8px) scale(1.03) !important;
    box-shadow: 0 25px 50px rgba(0, 255, 204, 0.2), inset 0 0 25px rgba(176, 38, 255, 0.2) !important;
    border-color: rgba(0, 255, 204, 0.4) !important;
}

/* MODERN BUTTONS */
button, .btn {
    font-family: 'Space Mono', monospace !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    padding: 14px 35px !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff !important;
    background: linear-gradient(135deg, #b026ff, #00ffcc) !important;
    background-size: 200% auto !important;
    border: none !important;
    border-radius: 50px !important;
    box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3) !important;
    cursor: pointer !important;
    transition: all 0.4s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    margin: 15px auto;
    display: inline-block;
}

button::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #00ffcc, #b026ff);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.4s ease;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    transform: translateY(-4px) !important;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.5) !important;
}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {
    font-family: 'Poppins', sans-serif !important;
    font-size: 1.1rem !important;
    color: #b3b3b3 !important;
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.6;
    animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAVIGATION LINKS */
a.back-btn-global, a.back-home {
    position: fixed;
    top: 25px;
    left: 25px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: #fff;
    text-decoration: none;
    background: rgba(25, 25, 35, 0.6);
    padding: 12px 24px;
    border-radius: 30px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
}

a.back-btn-global:hover, a.back-home:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }
}
</style>

</head>
<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Dino Runner 🌵</h1>
        <canvas id="gameCanvas" width="900" height="300"></canvas>
        <div id="status-message">Press Start, then press **SPACEBAR** or **UP ARROW** to Jump!</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC (Canvas) ---

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusMessage = document.getElementById("status-message");
        const startButton = document.getElementById("startButton");

        let gameRunning = false;
        let score = 0;
        let highScore = 0;
        let gameLoopId;

        // --- Game Object Properties ---
        const player = {
            width: 25,
            height: 40,
            x: 50,
            y: 0,
            color: "#000",
            dy: 0,
            gravity: 0.6,
            jumpStrength: -10,
            isJumping: false,
            groundY: canvas.height - 43 // Position player just above the ground line (150 - 50 + 7)
        };

        let obstacles = [];
        const obstacleMinHeight = 25;
        const obstacleMaxHeight = 45;
        const obstacleColor = "#000";
        const obstacleSpeed = 4;
        const spawnInterval = 100; // Frames between spawns
        let frameCount = 0;
        let speedMultiplier = 1;

        // --- Drawing Functions ---

        function drawPlayer() {
            ctx.fillStyle = player.color;
            // Draw a simplified Dino shape (a simple rectangle)
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawObstacles() {
            ctx.fillStyle = obstacleColor;
            obstacles.forEach(obs => {
                // Draw obstacles (cacti)
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function drawScore() {
            ctx.font = "16px monospace";
            ctx.fillStyle = "#555";
            ctx.textAlign = "right";
            ctx.fillText("HI " + Math.floor(highScore).toString().padStart(5, '0') + " " + Math.floor(score).toString().padStart(5, '0'), canvas.width - 10, 20);
        }

        // --- Game Logic ---

        function resetGame() {
            player.y = player.groundY;
            player.dy = 0;
            player.isJumping = false;
            obstacles = [];
            score = 0;
            frameCount = 0;
            speedMultiplier = 1;
            statusMessage.textContent = "Running! Jump to avoid obstacles.";
            startButton.style.display = 'none';
        }

        function checkCollision() {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                
                // AABB Collision Check
                if (
                    player.x < obs.x + obs.width &&         
                    player.x + player.width > obs.x &&      
                    player.y < obs.y + obs.height &&        
                    player.y + player.height > obs.y        
                ) {
                    gameOver();
                    return true;
                }
            }
            return false;
        }

        function update() {
            // 1. Game Speed and Score
            score += 0.1 * speedMultiplier; 
            if (Math.floor(score) % 100 === 0 && Math.floor(score) > 0) {
                 // Increase speed every 100 points
                speedMultiplier += 0.1;
            }

            // 2. Player Physics
            if (player.y < player.groundY || player.dy < 0) { 
                player.dy += player.gravity; 
            }

            player.y += player.dy;

            if (player.y >= player.groundY) {
                player.y = player.groundY;
                player.dy = 0;
                player.isJumping = false;
            }

            // 3. Obstacle Spawning and Movement
            frameCount++;

            if (frameCount % spawnInterval === 0 || frameCount % (spawnInterval * 2) === 0) {
                const obsHeight = obstacleMinHeight + Math.random() * (obstacleMaxHeight - obstacleMinHeight); 
                const obsWidth = 10 + Math.random() * 20; // Varied width for different cacti
                
                obstacles.push({
                    x: canvas.width,
                    y: canvas.height - 3 - obsHeight, // 3px buffer from the ground line
                    width: obsWidth,
                    height: obsHeight
                });
            }

            // Move and clean up obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= obstacleSpeed * speedMultiplier; 

                // Remove obstacle if it goes off screen
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }
        }
        
        // --- Main Game Loop ---

        function gameLoop() {
            if (!gameRunning) return;

            // 1. Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 2. Update and Check
            update();
            if (checkCollision()) {
                return; 
            }

            // 3. Draw
            drawObstacles();
            drawPlayer();
            drawScore();

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- Control and Setup ---

        function jump() {
            if (gameRunning && !player.isJumping) {
                player.isJumping = true;
                player.dy = player.jumpStrength;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (gameRunning && (e.code === 'Space' || e.code === 'ArrowUp')) {
                e.preventDefault(); 
                jump();
            }
        });

        canvas.addEventListener('click', jump);

        function gameOver() {
            cancelAnimationFrame(gameLoopId);
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
            }

            statusMessage.textContent = `💥 Game Over! Score: ${Math.floor(score)}`;
            startButton.style.display = 'block';
            startButton.textContent = 'Play Again';
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            resetGame();
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        // Initialize the player's starting Y position
        player.groundY = canvas.height - player.height - 3; // 3px buffer from the ground line

        // --- End of JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

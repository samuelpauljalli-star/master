    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);

}

body {
    background-color: var(--bg-dark) !important;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(176, 38, 255, 0.1) 0%, transparent 40%),

body::before {

    top: 0; left: 0; right: 0; bottom: 0;

/* TYPOGRAPHY */

    font-family: 'Space Mono', monospace !important;
    font-size: clamp(2rem, 5vw, 3.5rem) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    text-align: center;

canvas, table, .container > div#game-board, .glass-panel {

    transform-origin: center center;
    transform: perspective(1000px) rotateX(8deg) scale(1.02) !important;
    transform-origin: bottom center;
    background: rgba(10,10,15, 0.7) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
    border: 1px solid var(--glass-border) !important;

    box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05) !important;

/* MODERN BUTTONS */

    padding: 14px 35px !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff !important;
    background: linear-gradient(135deg, #b026ff, #00ffcc) !important;
    background-size: 200% auto !important;
    border: none !important;
    border-radius: 50px !important;
    box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3) !important;

button::after {

}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {

/* NAVIGATION LINKS */

a.back-btn-global:hover, a.back-home:hover {

    border-color: #00ffcc;

}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }
}
</style>

/* DINO UPGRADE — Greenery theme */
#gameCanvas, canvas {
    cursor: pointer !important;
    border-radius: 18px !important;
    border: 2px solid rgba(0,200,80,0.4) !important;

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>

    <div class="container">
        <h1>Dino Runner 🦕</h1>
        <canvas id="gameCanvas" width="900" height="320"></canvas>
        <div id="status-message">Press <b>Start</b> then <b>SPACEBAR</b> or tap to jump!</div>
        <button id="startButton" onclick="startGame()">🎮 Start Game</button>
    </div>

    <script>
    // ══════════════════════════════════════════════════════════════
    // DINO RUNNER — Full Greenery Canvas Edition
    // ══════════════════════════════════════════════════════════════
    const canvas = document.getElementById("gameCanvas");
    const ctx    = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    const statusMessage = document.getElementById("status-message");
    const startButton   = document.getElementById("startButton");

    // ── Ground / sky layout
    const GROUND_Y = H - 70;   // top of green ground strip
    const DINO_GROUND = GROUND_Y - 48; // dino feet level

    // ── State
    let gameRunning = false, score = 0, highScore = 0, gameLoopId;
    let frameCount = 0, speedMult = 1;
    let legFrame = 0, legTick = 0;

    // ── Dino
    const dino = {
        x: 80, y: DINO_GROUND,
        w: 44, h: 48,
        dy: 0, gravity: 0.7,
        jumpStr: -13,
        jumping: false,
        dead: false,
        dustParticles: []
    };

    // ── Obstacles
    let obstacles = [];
    const CACTI = ['🌵','🪨','🌿'];

    // ── Clouds
    let clouds = [
        {x:200,y:50,speed:0.4,scale:1},
        {x:500,y:30,speed:0.3,scale:0.8},
        {x:750,y:65,speed:0.5,scale:0.7}
    ];

    // ── Trees (decorative background)
    let trees = [
        {x:100,y:GROUND_Y,h:60,r:28},
        {x:280,y:GROUND_Y,h:50,r:22},
        {x:600,y:GROUND_Y,h:70,r:32},
        {x:800,y:GROUND_Y,h:55,r:25}
    ];
    let treesX = 0; // scroll offset for trees

    // ── Birds
    let birds = [{x:400,y:80,flap:0,flapDir:1,speed:1.2},{x:700,y:55,flap:0.5,flapDir:1,speed:0.9}];

    // ── Day/night
    let timeOfDay = 0; // 0..1 cycles

    // ══ DRAW HELPERS ════════════════════════════════════════════
    function drawSky() {
        // Soft green/blue sky gradient
        const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
        sky.addColorStop(0,   '#87CEEB');  // sky blue
        sky.addColorStop(0.6, '#b7f0c4');  // light green-sky
        sky.addColorStop(1,   '#d4f7c5');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, GROUND_Y);
    }

    function drawSun() {
        ctx.save();
        ctx.shadowBlur = 40; ctx.shadowColor = 'rgba(255,220,50,0.7)';
        ctx.fillStyle = '#ffe94d';
        ctx.beginPath(); ctx.arc(W - 80, 50, 28, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function drawClouds() {
        clouds.forEach(cl => {
            ctx.save();
            ctx.globalAlpha = 0.85;
            const s = cl.scale;
            // Fluffy cloud shape
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10; ctx.shadowColor='rgba(255,255,255,0.4)';
            const cx = cl.x, cy = cl.y;
            ctx.beginPath();
            ctx.ellipse(cx,       cy,     40*s, 22*s, 0, 0, Math.PI*2);
            ctx.ellipse(cx-25*s,  cy+6*s, 25*s, 18*s, 0, 0, Math.PI*2);
            ctx.ellipse(cx+28*s,  cy+8*s, 28*s, 17*s, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        });
    }

    function drawHills() {
        // Far hill — very light green
        ctx.fillStyle = 'rgba(144,238,100,0.35)';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        for(let x=0;x<=W;x+=1){
            const y = GROUND_Y - 40 * Math.sin((x + treesX*0.15) / 120);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(W, GROUND_Y); ctx.closePath(); ctx.fill();

        // Near hill — medium green
        ctx.fillStyle = 'rgba(80,200,80,0.25)';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        for(let x=0;x<=W;x+=1){
            const y = GROUND_Y - 25 * Math.sin((x + treesX*0.4) / 80 + 1.2);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(W, GROUND_Y); ctx.closePath(); ctx.fill();
    }

    function drawTrees() {
        trees.forEach(t => {
            const tx = ((t.x - treesX) % (W + 120) + W + 120) % (W + 120) - 60;
            // trunk
            ctx.fillStyle = '#6b3f1e';
            ctx.fillRect(tx - 5, t.y - t.h, 10, t.h);
            // canopy layers
            const grd = ctx.createRadialGradient(tx, t.y-t.h-t.r*0.3, 4, tx, t.y-t.h, t.r);
            grd.addColorStop(0, '#5ddb44');
            grd.addColorStop(0.5,'#3cb830');
            grd.addColorStop(1, '#237a14');
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.ellipse(tx, t.y-t.h-5, t.r, t.r*0.85, 0, 0, Math.PI*2); ctx.fill();
            // top tuft
            ctx.fillStyle='#6ae84e';
            ctx.beginPath(); ctx.ellipse(tx, t.y-t.h-t.r*0.6, t.r*0.6, t.r*0.5, 0, 0, Math.PI*2); ctx.fill();
        });
    }

    function drawGround() {
        // Grass strip
        const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
        grd.addColorStop(0,   '#4cbb17');
        grd.addColorStop(0.12,'#3da614');
        grd.addColorStop(0.3, '#2e8c10');
        grd.addColorStop(1,   '#1a5c09');
        ctx.fillStyle = grd;
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

        // Ground top highlight
        ctx.fillStyle = '#6ed63a';
        ctx.fillRect(0, GROUND_Y, W, 5);

        // Small grass blades along top
        ctx.fillStyle = '#82e84a';
        for(let x=10; x<W; x+=22){
            const bx = ((x - treesX*0.8) % W + W) % W;
            ctx.fillRect(bx,     GROUND_Y-6, 3, 7);
            ctx.fillRect(bx+6,   GROUND_Y-4, 2, 5);
            ctx.fillRect(bx+12,  GROUND_Y-7, 3, 8);
        }

        // Ground line
        ctx.strokeStyle = 'rgba(0,100,0,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
    }

    function drawBirds() {
        birds.forEach(b => {
            b.flap += 0.12 * b.flapDir;
            if(Math.abs(b.flap) > 0.6) b.flapDir *= -1;
            ctx.save();
            ctx.font = '22px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = 0.8 + Math.sin(b.flap*4)*0.15;
            // Simple V-bird
            ctx.strokeStyle='#333'; ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(b.x-10, b.y - b.flap*10);
            ctx.quadraticCurveTo(b.x, b.y+4, b.x+10, b.y - b.flap*10);
            ctx.stroke();
            ctx.restore();
        });
    }

    // ── DINO ───────────────────────────────────────────────────
    function drawDino() {
        ctx.save();
        ctx.font = '46px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';

        // Squash/stretch: stretch when jumping
        const scaleY = dino.jumping ? 1.15 : (legFrame===0&&!dino.jumping ? 0.97 : 1);
        ctx.transform(1, 0, 0, scaleY, 0, dino.y + dino.h - dino.y*scaleY + dino.y*(scaleY-1));

        if(dino.dead){
            ctx.globalAlpha = 0.6;
            ctx.fillText('💀', dino.x + dino.w/2, dino.y + dino.h + 2);
        } else {
            ctx.fillText('🦕', dino.x + dino.w/2, dino.y + dino.h + 2);
        }
        ctx.restore();

        // Dust particles on landing
        dino.dustParticles = dino.dustParticles.filter(p=>{
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; p.r += 0.5;
            if(p.alpha <= 0) return false;
            ctx.save(); ctx.globalAlpha=p.alpha;
            ctx.fillStyle=p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
            ctx.restore();
            return true;
        });
    }

    function spawnDust(){
        for(let i=0;i<6;i++){
            dino.dustParticles.push({
                x: dino.x + dino.w/2 + (Math.random()-0.5)*20,
                y: dino.y + dino.h,
                vx: (Math.random()-0.5)*2,
                vy: -Math.random()*2,
                alpha: 0.7 + Math.random()*0.3,
                r: 2 + Math.random()*3,
                color: `hsl(${80+Math.random()*40},70%,${50+Math.random()*20}%)`
            });
        }
    }

    // ── OBSTACLES ──────────────────────────────────────────────
    function drawObstacles() {
        ctx.font = '38px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        obstacles.forEach(obs => {
            ctx.fillText(obs.emoji, obs.x + obs.w/2, GROUND_Y + 2);
        });
    }

    // ── SCORE HUD ──────────────────────────────────────────────
    function drawScore() {
        ctx.save();
        ctx.font = "bold 16px 'Space Mono',monospace";
        ctx.fillStyle = 'rgba(0,60,0,0.7)';
        ctx.textAlign = 'right';
        ctx.fillText(`HI ${String(Math.floor(highScore)).padStart(5,'0')}  ${String(Math.floor(score)).padStart(5,'0')}`, W-14, 28);
        ctx.restore();

        // Speed level badge
        const lvl = Math.floor(speedMult * 10 - 9);
        if(lvl > 1){
            ctx.save();
            ctx.font = "bold 13px 'Space Mono',monospace";
            ctx.fillStyle='rgba(255,180,0,0.85)';
            ctx.textAlign='left';
            ctx.fillText(`LVL ${lvl}`, 14, 28);
            ctx.restore();
        }
    }

    // ══ GAME LOGIC ═══════════════════════════════════════════════
    function resetGame() {
        dino.y = DINO_GROUND; dino.dy = 0; dino.jumping = false; dino.dead = false;
        dino.dustParticles = [];
        obstacles = []; score = 0; frameCount = 0; speedMult = 1;
        statusMessage.textContent = "Running! SPACE / tap to jump!";
        startButton.style.display = 'none';
    }

    function playerJump() {
        if(gameRunning && !dino.jumping) {
            dino.jumping = true;
            dino.dy = dino.jumpStr;
        }
    }

    let prevJumping = false;
    function update() {
        score += 0.12 * speedMult;
        if(Math.floor(score) % 200 === 0 && Math.floor(score) > 0) speedMult = Math.min(2.5, speedMult + 0.06);

        // Physics
        if(dino.y < DINO_GROUND || dino.dy < 0) dino.dy += dino.gravity;
        dino.y += dino.dy;
        if(dino.y >= DINO_GROUND){
            if(dino.jumping) spawnDust();      // landing
            dino.y = DINO_GROUND; dino.dy = 0; dino.jumping = false;
        }

        // Leg animation
        if(!dino.jumping){ legTick++; if(legTick%10===0) legFrame ^= 1; }

        // Scroll world
        treesX += 0.5 * speedMult;
        clouds.forEach(cl => { cl.x -= cl.speed * speedMult; if(cl.x < -120) cl.x = W + 80; });
        birds.forEach(b  => { b.x  -= b.speed * speedMult;  if(b.x  < -30)  b.x  = W + 60; });

        // Obstacles
        frameCount++;
        const spawnEvery = Math.max(60, 110 - frameCount*0.04);
        if(frameCount % Math.floor(spawnEvery) === 0) {
            const w = 28 + Math.random()*18, h = 30 + Math.random()*22;
            obstacles.push({
                x: W + 20, w, h,
                emoji: CACTI[Math.floor(Math.random()*CACTI.length)]
            });
        }
        for(let i=obstacles.length-1;i>=0;i--){
            obstacles[i].x -= (6 + Math.random()*0.5) * speedMult;
            if(obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i,1);
        }
    }

    function checkCollision() {
        const pad = 10;  // forgiving hit-box
        for(const obs of obstacles){
            if(dino.x + pad      < obs.x + obs.w - pad &&
               dino.x + dino.w - pad > obs.x + pad     &&
               dino.y + pad      < GROUND_Y             &&
               dino.y + dino.h - pad > GROUND_Y - obs.h){
                return true;
            }
        }
        return false;
    }

    function gameOver(){
        cancelAnimationFrame(gameLoopId);
        gameRunning = false;
        dino.dead = true;
        if(score > highScore) highScore = score;
        statusMessage.textContent = `💥 Game Over! Score: ${Math.floor(score)} | Best: ${Math.floor(highScore)}`;
        startButton.style.display = 'block';
        startButton.textContent   = '🔄 Play Again';
        // Draw one last frame
        render();
    }

    function render(){
        ctx.clearRect(0, 0, W, H);
        drawSky();
        drawSun();
        drawClouds();
        drawHills();
        drawTrees();
        drawBirds();
        drawGround();
        drawObstacles();
        drawDino();
        drawScore();
    }

    function gameLoop(){
        if(!gameRunning) return;
        update();
        if(checkCollision()){ gameOver(); return; }
        render();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function startGame(){
        if(gameRunning) return;
        gameRunning = true;
        resetGame();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    // ── Controls
    document.addEventListener('keydown', e => {
        if(e.code === 'Space' || e.code === 'ArrowUp'){
            e.preventDefault();
            if(!gameRunning){ startGame(); return; }
            playerJump();
        }
    });
    canvas.addEventListener('click', () => {
        if(!gameRunning){ startGame(); return; }
        playerJump();
    });
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if(!gameRunning){ startGame(); return; }
        playerJump();
    }, {passive:false});

    // Initial idle screen
    render();
    </script>





<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

    <title>Whack-a-Mole</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Bangers', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #795548; /* Brown dirt background */
            color: #fff;
        }

        .container {
            background-color: #5d4037;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            color: #ffeb3b; /* Yellow title */
            font-size: 3em;
            margin-bottom: 10px;
        }

        #score, #time {
            font-size: 1.5em;
            margin: 10px 0;
            color: #ffffff;
        }

        /* Game Board (The Grid of Holes) */
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            margin: 20px auto;
            border: 5px solid #4e342e;
            padding: 10px;
            background-color: #3e2723;
            border-radius: 15px;
        }

        .hole {
            width: 100px;
            height: 100px;
            background-color: #000; /* Hole top/rim */
            border-radius: 50%; /* Makes it round */
            position: relative;
            overflow: hidden; /* Important to hide the mole when not popped up */
        }

        .mole {
            width: 80%;
            height: 80%;
            background-color: #8b4513; /* Mole color */
            position: absolute;
            bottom: -80px; /* Start position: hidden below the hole */
            left: 10%;
            border-radius: 50%;
            transition: bottom 0.2s ease-out; /* Smooth pop-up animation */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            user-select: none;
            box-shadow: 0 -5px 10px rgba(0, 0, 0, 0.5);
        }

        .mole.up {
            bottom: 5px; /* End position: popped up */
        }

        /* Buttons */
        button {
            background-color: #e91e63; /* Pink */
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c2185b;
        }
        /* --- END OF CSS STYLES --- */
    </style>

    <div class="container">
        <h1>Whack-A-Mole! 🔨</h1>
        
        <div id="score">Score: <span id="score-value">0</span></div>
        <div id="time">Time Left: <span id="time-value">30</span>s</div>

        <div id="game-board">
            </div>

        <button onclick="startGame()">Start Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        
        // 1. Game State Variables
        let score = 0;
        let timeLeft = 30;
        let timerId = null;
        let popUpTimerId = null;
        let isGameRunning = false;
        
        // 2. DOM Elements
        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score-value');
        const timeDisplay = document.getElementById('time-value');
        const startButton = document.querySelector('button');

        // Array to hold references to all mole elements
        let moles = []; 

        /**
         * Initializes the game by creating the holes and moles.
         */
        function createBoard() {
            gameBoard.innerHTML = ''; // Clear previous board
            moles = []; // Clear moles array

            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.classList.add('hole');
                
                const mole = document.createElement('div');
                mole.classList.add('mole');
                mole.textContent = '😠'; // Mole emoji
                mole.setAttribute('data-index', i);
                
                // Add click listener to the mole
                mole.addEventListener('click', whack);

                hole.appendChild(mole);
                gameBoard.appendChild(hole);
                moles.push(mole); // Store reference to the mole element
            }
        }

        /**
         * Selects a random mole to pop up.
         */
        function randomMolePopUp() {
            // Remove 'up' class from all moles first
            moles.forEach(mole => {
                mole.classList.remove('up');
            });

            // Select a random mole
            const randomIndex = Math.floor(Math.random() * moles.length);
            const randomMole = moles[randomIndex];
            
            // Make the mole pop up
            randomMole.classList.add('up');
            
            // Set a random time for the mole to stay up (between 500ms and 1500ms)
            const popUpTime = Math.random() * 1000 + 500;
            setTimeout(() => {
                randomMole.classList.remove('up');
            }, popUpTime);
        }

        /**
         * The main game loop: calls randomMolePopUp repeatedly.
         */
        function startPopUpTimer() {
            // Pop up a mole every 700 milliseconds
            popUpTimerId = setInterval(randomMolePopUp, 700); 
        }

        /**
         * Handles the player clicking (whacking) the mole.
         */
        function whack(event) {
            const clickedMole = event.target;
            
            // Check if the mole is currently up AND hasn't been hit yet this cycle
            if (clickedMole.classList.contains('up') && isGameRunning) {
                score++;
                scoreDisplay.textContent = score;
                
                // Visually confirm the hit and hide immediately
                clickedMole.textContent = '😵'; // Change emoji on hit
                clickedMole.classList.remove('up');
                
                // Reset emoji and prepare for next pop-up after a slight delay
                setTimeout(() => {
                    clickedMole.textContent = '😠';
                }, 100); 
            }
        }

        /**
         * Starts the main game timer (countdown).
         */
        function countdown() {
            timeLeft--;
            timeDisplay.textContent = timeLeft;

            if (timeLeft === 0) {
                clearInterval(timerId);
                clearInterval(popUpTimerId);
                isGameRunning = false;
                alert(`Game Over! Your final score is ${score}.`);
                startButton.textContent = 'Play Again';
            }
        }

        /**
         * The main function to start or restart the game.
         */
        function startGame() {
            if (isGameRunning) return; // Prevent double-start

            // 1. Reset State
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            isGameRunning = true;
            startButton.textContent = 'Game In Progress';
            
            // 2. Set Timers
            timerId = setInterval(countdown, 1000); // 1-second countdown
            startPopUpTimer();
        }

        // Initialize the board structure on page load
        createBoard();
        
        // --- END OF JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

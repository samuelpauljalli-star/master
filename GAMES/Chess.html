    <style>
        /* --- CSS STYLES --- */

<style id="wow-injected-styles">
/* --- GLOBAL RESET & THEME --- */
:root {
    --primary: #00ffcc;
    --secondary: #b026ff;
    --bg-dark: #07070a;
    --glass-bg: rgba(15, 15, 20, 0.5);
    --glass-border: rgba(255, 255, 255, 0.08);
}

body {
    background-color: var(--bg-dark) !important;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(176, 38, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.1) 0%, transparent 40%) !important;
    color: #e0e0e0 !important;
    font-family: 'Poppins', sans-serif !important;
    overflow-x: hidden;
    min-height: 100vh;
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(7,7,10,0.95), rgba(20,10,30,0.7));
    z-index: -2;
    pointer-events: none;
}

/* TYPOGRAPHY */
h1 {
    font-family: 'Space Mono', monospace !important;
    font-size: clamp(2rem, 5vw, 3.5rem) !important;
    font-weight: 800 !important;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(135deg, #00ffcc, #b026ff, #ff006e);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent !important;
    filter: drop-shadow(0px 0px 10px rgba(0, 255, 204, 0.3));
    animation: h1Shine 5s linear infinite;
    margin: 40px 0 20px 0 !important;
    letter-spacing: 3px;
}

@keyframes h1Shine {
    to { background-position: 200% center; }
}

/* GLASSMORPHISM CONTAINERS */
canvas, table, .container > div#game-board, .glass-panel {
    transform: perspective(1000px) rotateX(10deg) scale(1.02) !important;
    transform-origin: center center;
    transform: perspective(1000px) rotateX(8deg) scale(1.02) !important;
    transform-origin: bottom center;
    background: rgba(10,10,15, 0.7) !important;
    backdrop-filter: blur(20px) saturate(200%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
    border: 1px solid var(--glass-border) !important;
    border-radius: 24px !important;
    box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05) !important;
    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
    display: block;
    margin: 25px auto;
}

canvas:hover, table:hover {
    transform: translateY(-8px) scale(1.03) !important;
    box-shadow: 0 25px 50px rgba(0, 255, 204, 0.2), inset 0 0 25px rgba(176, 38, 255, 0.2) !important;
    border-color: rgba(0, 255, 204, 0.4) !important;
}

/* MODERN BUTTONS */
button, .btn {
    font-family: 'Space Mono', monospace !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    padding: 14px 35px !important;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff !important;
    background: linear-gradient(135deg, #b026ff, #00ffcc) !important;
    background-size: 200% auto !important;
    border: none !important;
    border-radius: 50px !important;
    box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3) !important;
    cursor: pointer !important;
    transition: all 0.4s ease !important;
    position: relative;
    overflow: hidden;
    z-index: 1;
    margin: 15px auto;
    display: inline-block;
}

button::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #00ffcc, #b026ff);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.4s ease;
}

button:hover::after {
    opacity: 1;
}

button:hover {
    transform: translateY(-4px) !important;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.5) !important;
}

/* PARAGRAPHS & STATUS */
#status-message, .status, p {
    font-family: 'Poppins', sans-serif !important;
    font-size: 1.1rem !important;
    color: #b3b3b3 !important;
    text-align: center;
    letter-spacing: 0.5px;
    line-height: 1.6;
    animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAVIGATION LINKS */
a.back-btn-global, a.back-home {
    position: fixed;
    top: 25px;
    left: 25px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: #fff;
    text-decoration: none;
    background: rgba(25, 25, 35, 0.6);
    padding: 12px 24px;
    border-radius: 30px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    text-transform: uppercase;
    letter-spacing: 1px;
}

a.back-btn-global:hover, a.back-home:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    transform: translateX(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #07070a; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #b026ff, #00ffcc); border-radius: 10px; }

/* AMBIENT GLOW ORBS */
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -3;
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 80px) scale(1.1); }
}
</style>

</head>
<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Basic Chess Board 👑</h1>
        <canvas id="chessCanvas" width="700" height="700"></canvas>
    </div>
    <div id="status">White to move. Click a square to select a piece.</div>

    <script>
        // --- JAVASCRIPT LOGIC (Canvas and Board State) ---

        const canvas = document.getElementById('chessCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');

        // --- Board Constants ---
        const boardSize = 8;
        const squareSize = canvas.width / boardSize;

        // Board Colors
        const lightColor = '#f0d9b5'; // Beige
        const darkColor = '#b58863';  // Brown

        // Piece Symbols (Unicode Chess Fonts)
        const pieces = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙', // White
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'  // Black
        };
        const pieceColor = {
            'K': 'white', 'Q': 'white', 'R': 'white', 'B': 'white', 'N': 'white', 'P': 'white',
            'k': 'black', 'q': 'black', 'r': 'black', 'b': 'black', 'n': 'black', 'p': 'black'
        };

        // --- Game State (Standard FEN Starting Position) ---
        let boardState = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];
        
        let selectedSquare = null; // { row, col }
        let currentTurn = 'white';

        // --- Drawing Functions ---

        /**
         * Draws the 8x8 checkerboard pattern.
         */
        function drawBoard() {
            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    const color = (row + col) % 2 === 0 ? lightColor : darkColor;
                    ctx.fillStyle = color;
                    ctx.fillRect(col * squareSize, row * squareSize, squareSize, squareSize);
                }
            }
        }

        /**
         * Draws all the pieces onto the board based on the boardState array.
         */
        function drawPieces() {
            ctx.font = `${squareSize * 0.7}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    const pieceKey = boardState[row][col];
                    if (pieceKey) {
                        const pieceSymbol = pieces[pieceKey];
                        const color = pieceColor[pieceKey];

                        ctx.fillStyle = color;
                        const x = col * squareSize + squareSize / 2;
                        const y = row * squareSize + squareSize / 2;
                        ctx.fillText(pieceSymbol, x, y);
                    }
                }
            }
        }
        
        /**
         * Highlights the selected square.
         */
        function drawHighlight() {
            if (selectedSquare) {
                const { row, col } = selectedSquare;
                ctx.fillStyle = 'rgba(0, 255, 0, 0.5)'; // Green semi-transparent highlight
                ctx.fillRect(col * squareSize, row * squareSize, squareSize, squareSize);
            }
        }

        /**
         * Main drawing function called on every frame/update.
         */
        function draw() {
            drawBoard();
            drawHighlight();
            drawPieces();
        }

        // --- Input Handling ---

        canvas.addEventListener('click', handleBoardClick);

        function handleBoardClick(event) {
            const rect = canvas.getBoundingClientRect();
            // Calculate mouse position relative to the canvas
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            // Determine the clicked row and column
            const col = Math.floor(mouseX / squareSize);
            const row = Math.floor(mouseY / squareSize);
            
            const clickedPiece = boardState[row][col];
            
            // --- CORE LOGIC FLOW (Needs Full Implementation Here) ---

            if (selectedSquare) {
                // 1. A piece is already selected (Attempting a move)
                const fromRow = selectedSquare.row;
                const fromCol = selectedSquare.col;
                const movingPiece = boardState[fromRow][fromCol];

                // **STEP 2: ADD MOVE VALIDATION HERE**
                // e.g., if (isValidMove(movingPiece, fromRow, fromCol, row, col)) { ... }
                
                // For demonstration: Assume any move is valid
                if (movingPiece && (fromRow !== row || fromCol !== col)) {
                    // Execute the move
                    boardState[row][col] = movingPiece;
                    boardState[fromRow][fromCol] = null;
                    
                    // Switch turn
                    currentTurn = currentTurn === 'white' ? 'black' : 'white';
                    statusDisplay.textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)} to move.`;
                }
                selectedSquare = null;
            } else if (clickedPiece) {
                // 2. No piece selected (Attempting to select a piece)
                const pieceColorCheck = pieceColor[clickedPiece];

                // Check if the piece belongs to the current player
                if (
                    (currentTurn === 'white' && pieceColorCheck === 'white') ||
                    (currentTurn === 'black' && pieceColorCheck === 'black')
                ) {
                    selectedSquare = { row, col };
                    statusDisplay.textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)} to move. Piece selected: ${pieces[clickedPiece]}`;
                } else {
                    statusDisplay.textContent = `It is ${currentTurn}'s turn. Please select your own piece.`;
                }
            }
            
            // Redraw the board to show the new state/selection
            draw();
        }

        // --- Initialization ---
        draw();
        
        // --- End of JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>

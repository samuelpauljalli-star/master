<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffe0f6; /* Soft pink background */
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #ff1493; /* Deep pink */
            margin-bottom: 25px;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            grid-template-rows: repeat(4, 1fr);    /* 4 rows (4x4 board = 16 cards) */
            gap: 10px;
            margin: 20px auto;
            width: 420px;
        }

        .card {
            width: 100px;
            height: 100px;
            background-color: #333; /* Default card back color */
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: white;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
            position: relative;
        }
        
        /* Card Front and Back Pseudo-elements for the Flip Effect */
        .card::before {
            content: '?';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            transform: rotateY(0deg);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.flipped::before {
            display: none; /* Hide question mark when flipped */
        }

        /* Styling for the revealed content */
        .card > span {
            display: none; 
            transform: rotateY(180deg); /* Content is shown when flipped */
        }

        .card.flipped > span {
            display: block;
        }

        /* Matched cards stay visible and change color */
        .card.matched {
            background-color: #4CAF50; /* Green */
            cursor: default;
            pointer-events: none; /* Make card unclickable */
        }
        
        #score {
            font-size: 1.2em;
            margin: 15px 0;
        }

        #reset-btn {
            background-color: #ff6347; /* Tomato */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        #reset-btn:hover {
            background-color: #e55337;
        }
        /* --- END OF CSS STYLES --- */
    </style>




<!-- Google Fonts & FontAwesome -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">

<style id="advanced-injected-styles">
/* Advanced Global Animations and Colors */

<body>
<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Emoji Memory Match 🦄</h1>
        
        <div id="game-board">
            </div>

        <div id="score">Moves: <span id="moves-count">0</span></div>
        <button id="reset-btn" onclick="startGame()">Start New Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const emojis = ['🍇', '🥝', '🍉', '🍍', '🍓', '🍑', '🍋', '🍒']; // 8 pairs
        let gameCards = [];
        let flippedCards = [];
        let matchesFound = 0;
        let moves = 0;
        let isProcessing = false; // Flag to prevent rapid clicks while checking a match

        const gameBoard = document.getElementById('game-board');
        const movesCountDisplay = document.getElementById('moves-count');

        /**
         * Shuffles an array using the Fisher-Yates algorithm.
         */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        /**
         * Initializes the game board and state.
         */
        function startGame() {
            // 1. Reset Game State
            gameBoard.innerHTML = '';
            flippedCards = [];
            matchesFound = 0;
            moves = 0;
            isProcessing = false;
            movesCountDisplay.textContent = moves;

            // 2. Create the Card Array (16 elements - 8 pairs)
            const cardValues = [...emojis, ...emojis];
            shuffleArray(cardValues);
            gameCards = cardValues;

            // 3. Render Cards to the DOM
            gameCards.forEach((value, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.setAttribute('data-index', index);
                
                // Add the emoji content inside a span (to be rotated with the flip)
                const content = document.createElement('span');
                content.textContent = value;
                card.appendChild(content);

                card.addEventListener('click', () => handleCardClick(card, value));
                gameBoard.appendChild(card);
            });
        }

        /**
         * Handles the logic when a card is clicked.
         */
        function handleCardClick(cardElement, cardValue) {
            // 1. Guard Clauses: Do nothing if...
            if (isProcessing || cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) {
                return;
            }

            // 2. Flip the card
            cardElement.classList.add('flipped');
            flippedCards.push({ element: cardElement, value: cardValue });
            
            // 3. Check for a match only when 2 cards are flipped
            if (flippedCards.length === 2) {
                isProcessing = true; // Prevent further clicks
                moves++;
                movesCountDisplay.textContent = moves;

                const [card1, card2] = flippedCards;

                if (card1.value === card2.value) {
                    // --- Match Found ---
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchesFound++;
                    flippedCards = []; // Clear for the next pair
                    isProcessing = false;

                    // Check for Win Condition
                    if (matchesFound === emojis.length) {
                        setTimeout(() => alert(`🎉 You won in ${moves} moves!`), 500);
                    }
                } else {
                    // --- No Match ---
                    // Use setTimeout to allow player to see the second card before flipping them back
                    setTimeout(() => {
                        card1.element.classList.remove('flipped');
                        card2.element.classList.remove('flipped');
                        flippedCards = [];
                        isProcessing = false;
                    }, 1000); // 1 second delay
                }
            }
        }

        // Start the game immediately when the page loads
        startGame();

        // --- END OF JAVASCRIPT LOGIC ---
    </script>

<script id="advanced-injected-logic">
// Inject floating background particles globally into each game
function createParticles() {
    const colors = ['#00f2fe', '#4facfe', '#8338ec', '#ff006e', '#ffd700'];
    for(let i=0; i<40; i++) {
        let p = document.createElement('div');
        p.className = 'bg-particle';
        let size = Math.random() * 5 + 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 ${size*2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 4 + 4) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        document.body.appendChild(p);
    }
}

if(document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createParticles);
} else {
    createParticles();
}

// Global click interactive logic: Ripple effect
document.addEventListener("click", function(e) {
    if(e.target.tagName === 'CANVAS' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TD') {
        let ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        ripple.style.width = '10px';
        ripple.style.height = '10px';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00f2fe';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        ripple.style.zIndex = '10000';
        document.body.appendChild(ripple);
        
        requestAnimationFrame(() => {
            ripple.style.width = '120px';
            ripple.style.height = '120px';
            ripple.style.opacity = '0';
            ripple.style.borderWidth = '15px';
            ripple.style.borderColor = '#ff006e';
        });
        
        setTimeout(() => ripple.remove(), 500);
    }
});
</script>

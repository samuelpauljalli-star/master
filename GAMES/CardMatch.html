    <title>Memory Match Game</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffe0f6; /* Soft pink background */
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #ff1493; /* Deep pink */
            margin-bottom: 25px;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            grid-template-rows: repeat(4, 1fr);    /* 4 rows (4x4 board = 16 cards) */
            gap: 10px;
            margin: 20px auto;
            width: 420px;
        }

        .card {
            width: 100px;
            height: 100px;
            background-color: #333; /* Default card back color */
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: white;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
            position: relative;
        }
        
        /* Card Front and Back Pseudo-elements for the Flip Effect */
        .card::before {
            content: '?';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            transform: rotateY(0deg);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.flipped::before {
            display: none; /* Hide question mark when flipped */
        }

        /* Styling for the revealed content */
        .card > span {
            display: none; 
            transform: rotateY(180deg); /* Content is shown when flipped */
        }

        .card.flipped > span {
            display: block;
        }

        /* Matched cards stay visible and change color */
        .card.matched {
            background-color: #4CAF50; /* Green */
            cursor: default;
            pointer-events: none; /* Make card unclickable */
        }
        
        #score {
            font-size: 1.2em;
            margin: 15px 0;
        }

        #reset-btn {
            background-color: #ff6347; /* Tomato */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        #reset-btn:hover {
            background-color: #e55337;
        }
        /* --- END OF CSS STYLES --- */
    </style>

<a href="index.html" class="back-btn-global">🔙 Back to Games</a>


    <div class="container">
        <h1>Emoji Memory Match 🦄</h1>
        
        <div id="game-board">
            </div>

        <div id="score">Moves: <span id="moves-count">0</span></div>
        <button id="reset-btn" onclick="startGame()">Start New Game</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        const emojis = ['🍇', '🥝', '🍉', '🍍', '🍓', '🍑', '🍋', '🍒']; // 8 pairs
        let gameCards = [];
        let flippedCards = [];
        let matchesFound = 0;
        let moves = 0;
        let isProcessing = false; // Flag to prevent rapid clicks while checking a match

        const gameBoard = document.getElementById('game-board');
        const movesCountDisplay = document.getElementById('moves-count');

        /**
         * Shuffles an array using the Fisher-Yates algorithm.
         */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        /**
         * Initializes the game board and state.
         */
        function startGame() {
            // 1. Reset Game State
            gameBoard.innerHTML = '';
            flippedCards = [];
            matchesFound = 0;
            moves = 0;
            isProcessing = false;
            movesCountDisplay.textContent = moves;

            // 2. Create the Card Array (16 elements - 8 pairs)
            const cardValues = [...emojis, ...emojis];
            shuffleArray(cardValues);
            gameCards = cardValues;

            // 3. Render Cards to the DOM
            gameCards.forEach((value, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.setAttribute('data-index', index);
                
                // Add the emoji content inside a span (to be rotated with the flip)
                const content = document.createElement('span');
                content.textContent = value;
                card.appendChild(content);

                card.addEventListener('click', () => handleCardClick(card, value));
                gameBoard.appendChild(card);
            });
        }

        /**
         * Handles the logic when a card is clicked.
         */
        function handleCardClick(cardElement, cardValue) {
            // 1. Guard Clauses: Do nothing if...
            if (isProcessing || cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) {
                return;
            }

            // 2. Flip the card
            cardElement.classList.add('flipped');
            flippedCards.push({ element: cardElement, value: cardValue });
            
            // 3. Check for a match only when 2 cards are flipped
            if (flippedCards.length === 2) {
                isProcessing = true; // Prevent further clicks
                moves++;
                movesCountDisplay.textContent = moves;

                const [card1, card2] = flippedCards;

                if (card1.value === card2.value) {
                    // --- Match Found ---
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchesFound++;
                    flippedCards = []; // Clear for the next pair
                    isProcessing = false;

                    // Check for Win Condition
                    if (matchesFound === emojis.length) {
                        setTimeout(() => alert(`🎉 You won in ${moves} moves!`), 500);
                    }
                } else {
                    // --- No Match ---
                    // Use setTimeout to allow player to see the second card before flipping them back
                    setTimeout(() => {
                        card1.element.classList.remove('flipped');
                        card2.element.classList.remove('flipped');
                        flippedCards = [];
                        isProcessing = false;
                    }, 1000); // 1 second delay
                }
            }
        }

        // Start the game immediately when the page loads
        startGame();

        // --- END OF JAVASCRIPT LOGIC ---
    </script>




<script id="wow-injected-logic">
document.addEventListener("DOMContentLoaded", () => {
    // 1. Custom Glow Cursor Trailer
    const trailer = document.createElement("div");
    trailer.style.position = "fixed";
    trailer.style.width = "16px";
    trailer.style.height = "16px";
    trailer.style.borderRadius = "50%";
    trailer.style.backgroundColor = "transparent";
    trailer.style.border = "2px solid #00ffcc";
    trailer.style.pointerEvents = "none";
    trailer.style.zIndex = "99999";
    trailer.style.transition = "width 0.2s, height 0.2s, background-color 0.2s, transform 0.1s ease-out";
    trailer.style.transform = "translate(-50%, -50%)";
    trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
    document.body.appendChild(trailer);

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let trailerX = mouseX;
    let trailerY = mouseY;

    window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateTrailer() {
        trailerX += (mouseX - trailerX) * 0.15;
        trailerY += (mouseY - trailerY) * 0.15;
        trailer.style.left = `${trailerX}px`;
        trailer.style.top = `${trailerY}px`;
        requestAnimationFrame(animateTrailer);
    }
    animateTrailer();

    // Emphasize cursor on interactive elements
    const setupInteractables = () => {
        const interactables = document.querySelectorAll('button, a, input, canvas, table, .game-card');
        interactables.forEach(el => {
            if(el.dataset.trailerBound) return;
            el.dataset.trailerBound = "true";
            el.addEventListener('mouseenter', () => {
                trailer.style.width = "40px";
                trailer.style.height = "40px";
                trailer.style.borderColor = "#b026ff";
                trailer.style.backgroundColor = "rgba(176, 38, 255, 0.1)";
                trailer.style.boxShadow = "0 0 15px #b026ff, inset 0 0 15px #b026ff";
            });
            el.addEventListener('mouseleave', () => {
                trailer.style.width = "16px";
                trailer.style.height = "16px";
                trailer.style.borderColor = "#00ffcc";
                trailer.style.backgroundColor = "transparent";
                trailer.style.boxShadow = "0 0 12px #00ffcc, inset 0 0 12px #00ffcc";
            });
        });
    };
    setupInteractables();
    
    // observe DOM for new elements (in case game logic generates buttons dynamically)
    new MutationObserver(() => setupInteractables()).observe(document.body, { childList: true, subtree: true });

    // 2. Click Ripple Effect
    document.addEventListener('click', (e) => {
        const ripple = document.createElement('div');
        ripple.style.position = 'fixed';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
         ripple.style.width = '0px';
        ripple.style.height = '0px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'transparent';
        ripple.style.border = '2px solid #00ffcc';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%)';
        ripple.style.zIndex = '99998';
        ripple.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
        document.body.appendChild(ripple);

        requestAnimationFrame(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.borderWidth = '10px';
            ripple.style.borderColor = '#b026ff';
            ripple.style.opacity = '0';
        });

        setTimeout(() => ripple.remove(), 600);
    });

    // 3. Dynamic Background Orbs
    const createOrb = (color, delay) => {
        const gl = document.createElement('div');
        gl.className = 'ambient-glow';
        gl.style.width = (Math.random() * 200 + 200) + 'px';
        gl.style.height = gl.style.width;
        gl.style.background = color;
        gl.style.left = (Math.random() * 100) + 'vw';
        gl.style.top = (Math.random() * 100) + 'vh';
        gl.style.animationDelay = delay + 's';
        document.body.appendChild(gl);
    };
    
    createOrb('rgba(0, 255, 204, 0.15)', 0);
    createOrb('rgba(176, 38, 255, 0.15)', 2);
    createOrb('rgba(255, 0, 110, 0.1)', 4);
    
    // Smooth reveal for main container
    const container = document.querySelector('.container') || document.body.children[0];
    if(container && container.style) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'all 1s ease-out';
        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>
